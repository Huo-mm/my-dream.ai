<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>記憶倉庫</title>
    <style>
        :root { --primary: #673ab7; --bg: #f5f5f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100dvh; }
        
        .app-bar { padding: 15px; background: var(--primary); color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { text-decoration: none; color: white; font-size: 20px; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .archive-item { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .archive-info h4 { margin: 0; color: #333; font-size: 16px; }
        .archive-info p { margin: 5px 0 0; color: #888; font-size: 12px; }

        /* 全螢幕展示層 */
        #detail-view {
            display: none; position: fixed; inset: 0; background: #f0f2f5;
            z-index: 100; flex-direction: column;
        }
        .detail-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* 對話框樣式複刻 */
        .bubble { 
            padding: 10px 14px; 
            border-radius: 18px; 
            font-size: 14px; 
            max-width: 85%; 
            line-height: 1.5; 
            word-break: break-all; /* 防止長網址撐破 */
            white-space: pre-wrap;  /* 保留文字內的換行 */
        }
        .user-b { align-self: flex-end; background: #4285f4; color: white; border-bottom-right-radius: 4px; }
        .ai-b { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .close-btn { background: #d9534f; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html" class="back-btn">❮</a>
    <h3 style="margin:0">記憶倉庫</h3>
</div>

<div class="list-container" id="archiveList"></div>

<div id="detail-view">
    <div class="app-bar" style="background: #555;">
        <span style="flex:1" id="detail-date">詳細紀錄</span>
        <button onclick="closeDetail()" style="background:none; border:none; color:white; font-size: 16px; cursor:pointer;">關閉</button>
    </div>
    <div class="detail-content" id="detailContent"></div>
    <button class="close-btn" onclick="deleteCurrent()">⚠️ 刪除此筆紀錄</button>
</div>

<script>
    let archives = JSON.parse(localStorage.getItem('chat_archives') || "[]");
    let currentIdx = null;

    function renderList() {
        const list = document.getElementById('archiveList');
        if (archives.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:#999; margin-top:50px;">目前沒有儲存的記憶喵～</p>`;
            return;
        }
        list.innerHTML = archives.map((item, i) => `
            <div class="archive-item" onclick="openDetail(${i})">
                <div class="archive-info">
                    <h4>對話紀錄備份</h4>
                    <p>📅 ${item.date}</p>
                </div>
                <span style="color:#ccc">❯</span>
            </div>
        `).join('');
    }

    function openDetail(i) {
        currentIdx = i;
        const item = archives[i];
        document.getElementById('detail-date').innerText = item.date;
        const contentBox = document.getElementById('detailContent');
        
        // 1. 先徹底濾掉包含在裡面的 <SEND_MAIL> 程式碼標籤
        let cleanContent = item.content.replace(/<SEND_MAIL>[\s\S]*?<\/SEND_MAIL>/g, '').trim();

        // 2. 使用正規表達式切分「使用者:」或「助手:」，確保不會因為內容換行而斷掉
        // 這個正則會尋找開頭是關鍵字的地方作為切分點
        const parts = cleanContent.split(/(?=使用者:|助手:)/);
        
        contentBox.innerHTML = parts.map(part => {
            const trimmedPart = part.trim();
            if (!trimmedPart) return "";

            if (trimmedPart.startsWith('使用者:')) {
                const text = trimmedPart.replace('使用者:', '').trim();
                return `<div class="bubble user-b">${text}</div>`;
            } else if (trimmedPart.startsWith('助手:')) {
                const text = trimmedPart.replace('助手:', '').trim();
                return `<div class="bubble ai-b">${text}</div>`;
            } else {
                // 處理不符合格式的文字內容
                return `<div style="font-size:12px; color:#999; text-align:center; margin:5px 0;">${trimmedPart}</div>`;
            }
        }).join('');

        document.getElementById('detail-view').style.display = 'flex';
    }

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
    }

    function deleteCurrent() {
        if(confirm("確定要永久刪除這段記憶嗎？這是無法復原的喔！")) {
            archives.splice(currentIdx, 1);
            localStorage.setItem('chat_archives', JSON.stringify(archives));
            renderList();
            closeDetail();
        }
    }

    renderList();
</script>
</body>
</html>
