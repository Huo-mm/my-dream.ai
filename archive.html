<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>記憶倉庫</title>
    <style>
        :root { 
            --primary: #673ab7; 
            --bg: #f5f5f5; 
            --color-a: #4285f4; 
            --color-b: #1a2a6c;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100dvh; }
        
        /* 讓 AppBar 也連動主題色 */
        .app-bar { 
            padding: calc(env(safe-area-inset-top) + 15px) 15px 15px 15px; 
            background: linear-gradient(135deg, var(--color-a), var(--color-b)); 
            color: white; display: flex; align-items: center; gap: 15px; 
        }
        .back-btn { text-decoration: none; color: white; font-size: 20px; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .archive-item { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .archive-info h4 { margin: 0; color: #333; font-size: 16px; word-break: break-all; }
        .archive-info p { margin: 5px 0 0; color: #888; font-size: 12px; }

        /* 展示層 */
        #detail-view {
            display: none; position: fixed; inset: 0; background: #f0f2f5;
            z-index: 100; flex-direction: column;
        }
        .detail-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 85%; line-height: 1.5; word-break: break-all; white-space: pre-wrap; }
        .user-b { align-self: flex-end; background: var(--color-a); color: white; border-bottom-right-radius: 4px; }
        .ai-b { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .footer-btns { display: flex; border-top: 1px solid #ddd; }
        .btn-sub { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .edit-btn { background: #f1f3f4; color: #555; }
        .del-btn { background: #fee; color: #d9534f; }

        /* ✨ 自製彈窗樣式 (完全同步 settings.html) */
        #customModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background:white; width:80%; max-width:300px; border-radius:25px; 
            overflow:hidden; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-header { padding:15px; text-align:center; color:white; font-weight:bold; font-size: 16px; background: linear-gradient(135deg, var(--color-a), var(--color-b)); }
        .modal-body { padding:25px 20px; text-align:center; color:#444; font-size:15px; }
        .modal-input { width: 90%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .modal-footer { display:flex; border-top:1px solid #eee; }
        .modal-btn { flex:1; padding:15px; border:none; background:white; color:#007aff; font-weight:bold; font-size:16px; cursor:pointer; }
        .modal-btn:last-child { border-left: 1px solid #eee; }
        .modal-btn.danger { color: #ff3b30; }

        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-bar" id="topBar">
    <a href="index.html" class="back-btn">❮</a>
    <h3 style="margin:0">記憶倉庫</h3>
</div>

<div class="list-container" id="archiveList"></div>

<div id="detail-view">
    <div class="app-bar" style="background: #555;" id="detailBar">
        <span style="flex:1; cursor:pointer;" id="detail-title" onclick="editTitle()">詳細紀錄 ✎</span>
        <button onclick="closeDetail()" style="background:none; border:none; color:white; font-size: 16px; cursor:pointer;">關閉</button>
    </div>
    <div class="detail-content" id="detailContent"></div>
    <div id="detail-footer-info" style="padding: 10px; text-align: center; font-size: 11px; color: #aaa; background: #f0f2f5;"></div>
    
    <div class="footer-btns">
        <button class="btn-sub edit-btn" onclick="editTitle()">📝 修改標題</button>
        <button class="btn-sub del-btn" onclick="deleteCurrent()">🗑️ 刪除紀錄</button>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalHeader" class="modal-header">標題</div>
        <div id="modalBody" class="modal-body">內容文字</div>
        <div id="inputArea" style="display:none; text-align:center; padding-bottom:20px;">
            <input type="text" id="modalInput" class="modal-input" placeholder="請輸入標題...">
        </div>
        <div class="modal-footer" id="modalFooter">
            </div>
    </div>
</div>

<script>
    let archives = JSON.parse(localStorage.getItem('chat_archives') || "[]");
    let currentIdx = null;

    // 💡 同步主題色
    function applyTheme() {
        const colorA = localStorage.getItem('theme_color_a') || '#4285f4';
        const colorB = localStorage.getItem('theme_color_b') || '#1a2a6c';
        document.documentElement.style.setProperty('--color-a', colorA);
        document.documentElement.style.setProperty('--color-b', colorB);
    }

    // 💡 萬用彈窗函數
    function mineDialog({ title, message, type = 'alert', onConfirm }) {
        const modal = document.getElementById('customModal');
        const header = document.getElementById('modalHeader');
        const inputArea = document.getElementById('inputArea');
        const footer = document.getElementById('modalFooter');
        
        document.getElementById('modalHeader').innerText = title;
        document.getElementById('modalBody').innerText = message;
        inputArea.style.display = (type === 'prompt') ? 'block' : 'none';
        
        // 生成按鈕
        footer.innerHTML = '';
        if (type === 'alert') {
            footer.innerHTML = `<button class="modal-btn" onclick="closeModal()">確定</button>`;
        } else if (type === 'confirm') {
            footer.innerHTML = `
                <button class="modal-btn" onclick="closeModal()">取消</button>
                <button class="modal-btn danger" id="confirmBtn">刪除</button>
            `;
            document.getElementById('confirmBtn').onclick = () => { closeModal(); onConfirm(); };
        } else if (type === 'prompt') {
            footer.innerHTML = `
                <button class="modal-btn" onclick="closeModal()">取消</button>
                <button class="modal-btn" id="saveBtn">儲存</button>
            `;
            document.getElementById('saveBtn').onclick = () => {
                const val = document.getElementById('modalInput').value;
                if (val.trim()) { closeModal(); onConfirm(val); }
            };
        }
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('modalInput').value = '';
    }

    function renderList() {
        const list = document.getElementById('archiveList');
        if (archives.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:#999; margin-top:50px;">目前沒有儲存的記憶喵～</p>`;
            return;
        }
        list.innerHTML = archives.map((item, i) => `
            <div class="archive-item" onclick="openDetail(${i})">
                <div class="archive-info">
                    <h4>${item.title || '未命名紀錄'}</h4>
                    <p>📅 ${item.date}</p>
                </div>
                <span style="color:#ccc">❯</span>
            </div>
        `).join('');
    }

    function openDetail(i) {
        currentIdx = i;
        const item = archives[i];
        document.getElementById('detail-title').innerText = (item.title || "詳細紀錄") + " ✎";
        document.getElementById('detail-footer-info').innerText = `儲存時間：${item.date}`;
        
        const contentBox = document.getElementById('detailContent');
        let cleanContent = item.content.replace(/<SEND_MAIL>[\s\S]*?<\/SEND_MAIL>/g, '').trim();
        const parts = cleanContent.split(/(?=使用者:|助手:)/);
        
        contentBox.innerHTML = parts.map(part => {
            const trimmedPart = part.trim();
            if (!trimmedPart) return "";
            if (trimmedPart.startsWith('使用者:')) {
                return `<div class="bubble user-b">${trimmedPart.replace('使用者:', '').trim()}</div>`;
            } else if (trimmedPart.startsWith('助手:')) {
                return `<div class="bubble ai-b">${trimmedPart.replace('助手:', '').trim()}</div>`;
            }
            return `<div style="font-size:12px; color:#999; text-align:center; margin:5px 0;">${trimmedPart}</div>`;
        }).join('');
        document.getElementById('detail-view').style.display = 'flex';
    }

    function editTitle() {
        const currentTitle = archives[currentIdx].title || "";
        mineDialog({
            title: '重命名紀錄',
            message: '請輸入新的標題名稱：',
            type: 'prompt',
            onConfirm: (newTitle) => {
                archives[currentIdx].title = newTitle.trim();
                localStorage.setItem('chat_archives', JSON.stringify(archives));
                document.getElementById('detail-title').innerText = newTitle + " ✎";
                renderList();
            }
        });
    }

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
    }

    function deleteCurrent() {
        mineDialog({
            title: '刪除記憶',
            message: '確定要永久刪除這段記憶嗎？此動作無法復原。',
            type: 'confirm',
            onConfirm: () => {
                archives.splice(currentIdx, 1);
                localStorage.setItem('chat_archives', JSON.stringify(archives));
                renderList();
                closeDetail();
            }
        });
    }

    window.onload = () => {
        applyTheme();
        renderList();
    };
</script>
</body>
</html>
