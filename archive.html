<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶倉庫</title>
    <style>
        :root { --primary: #673ab7; --bg: #f3f0f7; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: white; border-bottom: 1px solid #ddd; }
        a { text-decoration: none; color: var(--primary); font-size: 16px; font-weight: bold; }
        .content { flex: 1; padding: 15px; overflow-y: auto; }
        .archive-item { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
        }
        .time { font-size: 12px; color: #888; margin-bottom: 8px; }
        .text { font-size: 14px; color: #333; white-space: pre-wrap; line-height: 1.6; }
        .del-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; margin-top: -5px; }
    </style>
</head>
<body>
<div class="app-bar">
    <a href="index.html">❮ 桌面</a>
    <h3 style="margin:0">記憶倉庫</h3>
    <span style="width:40px"></span>
</div>
<div class="content" id="archive-list"></div>

<script>
    function renderArchive() {
        const list = document.getElementById('archive-list');
        const archives = JSON.parse(localStorage.getItem('chat_archives') || "[]");
        list.innerHTML = archives.length ? "" : "<div style='text-align:center; color:#999; margin-top:50px;'>倉庫目前空空的喵...</div>";
        
        archives.forEach((item, index) => {
            list.innerHTML += `
                <div class="archive-item">
                    <button class="del-btn" onclick="deleteArchive(${index})">刪除</button>
                    <div class="time">${item.date}</div>
                    <div class="text">${item.content}</div>
                </div>
            `;
        });
    }

    function deleteArchive(index) {
        let archives = JSON.parse(localStorage.getItem('chat_archives') || "[]");
        archives.splice(index, 1);
        localStorage.setItem('chat_archives', JSON.stringify(archives));
        renderArchive();
    }

    renderArchive();
</script>
</body>
</html>
