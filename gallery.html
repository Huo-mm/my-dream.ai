<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相簿 APP</title>
    <style>
        :root { --primary: #e91e63; }
        body { margin: 0; background: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; text-align: center; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        a { text-decoration: none; color: var(--primary); font-size: 16px; }
        h3 { margin: 0; }
        
        /* 相簿網格 */
        #gallery-grid {
            flex: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: start;
        }
        .thumb-box {
            width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden;
            border: 2px solid transparent; cursor: pointer; transition: 0.2s;
            background: #eee;
        }
        .thumb-box:hover { border-color: var(--primary); }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .upload-area { padding: 20px; border-top: 1px solid #eee; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html">❮ 桌面</a>
    <h3>相簿</h3>
    <span style="width:40px"></span> </div>

<div id="gallery-grid">
    </div>

<div class="upload-area">
    <input type="file" id="photoPicker" style="display:none" accept="image/*" onchange="uploadPhoto(event)">
    <button class="btn" onclick="document.getElementById('photoPicker').click()">+ 上傳新照片</button>
</div>

<script>
    let photoList = JSON.parse(localStorage.getItem('my_photos')) || [];

    function renderGallery() {
        const grid = document.getElementById('gallery-grid');
        grid.innerHTML = "";
        
        photoList.forEach((data, index) => {
            const box = document.createElement('div');
            box.className = 'thumb-box';
            box.onclick = () => setWallpaper(data); // 點擊設定桌布
            
            const img = document.createElement('img');
            img.src = data;
            box.appendChild(img);
            grid.appendChild(box);
        });
    }

    // 將新照片上傳並存入緩存
    function uploadPhoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const imageData = e.target.result;
            photoList.push(imageData); // 加入陣列
            localStorage.setItem('my_photos', JSON.stringify(photoList)); // 存入緩存
            renderGallery();
        };
        reader.readAsDataURL(file);
    }

    // 【關鍵】將選定的圖片存為桌布路徑
    function setWallpaper(imageData) {
        if(confirm("確定要把這張圖設為桌面背景嗎喵？")) {
            localStorage.setItem('active_wallpaper', imageData);
            alert("桌布已更新喵！返回桌面看看吧。");
        }
    }

    renderGallery(); // 初始化
</script>
</body>
</html>
