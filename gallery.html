<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相簿與桌布</title>
    <style>
        :root { --primary: #e91e63; --bg: #f0f2f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100dvh; }
        .app-bar { padding: 15px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 5px; 
            overflow-y: auto; flex: 1; align-content: start;
        }
        .photo-item { 
            aspect-ratio: 1 / 1; background-size: cover; background-position: center; 
            border-radius: 8px; position: relative; cursor: pointer;
        }
        .btn-upload { 
            background: var(--primary); color: white; padding: 12px; text-align: center; 
            margin: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        /* 預覽視窗 */
        #viewer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        #viewer img { max-width: 90%; max-height: 70%; border-radius: 10px; object-fit: contain; }
        .viewer-btns { margin-top: 20px; display: flex; gap: 10px; }
        .v-btn { padding: 10px 20px; border-radius: 20px; border: none; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html" style="text-decoration:none; color:var(--primary);">❮ 返回</a>
    <h3 style="margin:0">我的相簿</h3>
    <span style="width:40px"></span>
</div>

<label class="btn-upload">
    ＋ 上傳新圖片
    <input type="file" accept="image/*" id="fileInput" style="display:none;" onchange="handleUpload(this)">
</label>

<div class="grid" id="photoGrid"></div>

<div id="viewer">
    <img id="viewImg">
    <div class="viewer-btns">
        <button class="v-btn" style="background:#4caf50; color:white;" onclick="setAsWallpaper()">設定為桌布</button>
        <button class="v-btn" style="background:#ff5252; color:white;" onclick="deletePhoto()">刪除</button>
        <button class="v-btn" style="background:#eee;" onclick="closeViewer()">關閉</button>
    </div>
    <p style="color:white; font-size:12px; margin-top:15px;">※ 設定後會自動填滿螢幕不留空</p>
</div>

<script>
    let photos = JSON.parse(localStorage.getItem('my_photos') || "[]");
    let currentIdx = null;

    function render() {
        const grid = document.getElementById('photoGrid');
        grid.innerHTML = photos.map((p, i) => `
            <div class="photo-item" style="background-image:url(${p})" onclick="openViewer(${i})"></div>
        `).join('');
    }

    async function handleUpload(input) {
        if (!input.files[0]) return;
        const file = input.files[0];

        // 使用 Canvas 進行簡單裁切與壓縮，避免 localStorage 爆失
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                // 為了手機桌布，我們將圖片縮小到 1080p 以內
                let width = img.width;
                let height = img.height;
                const max = 1080;
                if (width > max || height > max) {
                    if (width > height) { height *= max/width; width = max; }
                    else { width *= max/height; height = max; }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // 壓縮圖片品質為 0.7
                const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                photos.push(compressedData);
                save();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function openViewer(i) {
        currentIdx = i;
        document.getElementById('viewImg').src = photos[i];
        document.getElementById('viewer').style.display = 'flex';
    }

    function closeViewer() {
        document.getElementById('viewer').style.display = 'none';
    }

    function setAsWallpaper() {
        // 儲存桌布圖片
        localStorage.setItem('active_wallpaper', photos[currentIdx]);
        // 通知桌布引擎（index.html）使用「填滿」模式
        localStorage.setItem('wallpaper_mode', 'cover');
        alert("桌布設定成功！已為你自動裁切填滿！");
        closeViewer();
    }

    function deletePhoto() {
        if(confirm("確定刪除嗎？")) {
            photos.splice(currentIdx, 1);
            save();
            closeViewer();
        }
    }

    function save() {
        try {
            localStorage.setItem('my_photos', JSON.stringify(photos));
            render();
        } catch(e) {
            alert("記憶體爆炸！請先刪除一些舊照片再上傳。");
        }
    }

    render();
</script>
</body>
</html>
