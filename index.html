<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 偵錯工具</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; padding: 20px; }
        .box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #0084ff; color: white; border: none; padding: 10px 20px; border-radius: 5px; width: 100%; margin-top: 10px; }
        #log { background: #333; color: #0f0; padding: 10px; border-radius: 5px; margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h3>最後偵錯測試</h3>
    <button class="btn" onclick="setKey()">1. 設定/更新 API Key</button>
    <input type="text" id="testMsg" style="width:100%; margin-top:10px; padding:8px; box-sizing:border-box" placeholder="隨便打個字...">
    <button class="btn" style="background:#28a745" onclick="testConnection()">2. 開始測試連線</button>
</div>

<div id="log">測試結果會顯示在這裡...</div>

<script>
    function setKey() {
        const k = prompt("請貼上 API Key:");
        if(k) { localStorage.setItem('my_ai_key', k.trim()); alert("已儲存！"); }
    }

    async function testConnection() {
        const log = document.getElementById('log');
        const key = localStorage.getItem('my_ai_key');
        const text = document.getElementById('testMsg').value || "Hello";
        
        if(!key) { log.innerText = "錯誤：你還沒設定 API Key！"; return; }
        
        log.innerText = "正在連線到 Google...\n";

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await res.json();
            log.innerText += "--- 收到回報 ---\n" + JSON.stringify(data, null, 2);
        } catch (e) {
            log.innerText += "--- 網路層級錯誤 ---\n" + e.toString();
        }
    }
</script>

</body>
</html>
