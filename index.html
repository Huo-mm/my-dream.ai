<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私人 AI 助手 - 記憶優化版</title>
    <style>
        :root { --main-color: #4285f4; --bg-color: #f0f2f5; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg-color); font-family: -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄：手機版預設隱藏在左側 */
        #sidebar { 
            width: 280px; background: white; border-right: 1px solid #ddd; padding: 20px; 
            display: flex; flex-direction: column; overflow-y: auto; 
            position: relative; transition: 0.3s; z-index: 100;
        }

        /* 遮罩層：點擊可收起側邊欄 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 90;
        }

        /* 手機版適配 */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; height: 100%; }
            #sidebar.open { left: 0; }
            #sidebar.open + #overlay { display: block; }
        }
        
        /* 主區域 */
        #main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        .app-bar { background: var(--main-color); color: white; padding: 12px 15px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .menu-btn { cursor: pointer; font-size: 24px; padding: 0 10px; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: var(--bg-color); }
        
        /* 訊息氣泡 */
        .msg { padding: 10px 14px; border-radius: 18px; margin-bottom: 12px; max-width: 85%; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .u { align-self: flex-end; background: var(--main-color); color: white; border-bottom-right-radius: 2px; }
        .a { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* 輸入區塊 */
        .input-area { background: white; padding: 12px; border-top: 1px solid #eee; display: flex; flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        input[type="text"]#userInput { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 16px; }
        .send-btn { background: var(--main-color); color: white; border: none; padding: 0 18px; margin-left: 8px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* 設定欄位樣式 */
        h3 { margin-top: 0; color: #333; }
        label { font-size: 12px; color: #777; margin-top: 12px; display: block; }
        .set-input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .save-btn { background: #28a745; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .clear-btn { background: #dc3545; color: white; border: none; padding: 8px; margin-top: 15px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>⚙️ 設定中心</h3>
    <label>API Key (AIza...)</label>
    <input type="text" id="apiKey" class="set-input" placeholder="請貼上你的 Key">
    
    <label>角色名稱</label>
    <input type="text" id="charName" class="set-input" placeholder="顯示的名字">
    
    <label>角色靈魂設定</label>
    <textarea id="charPrompt" rows="8" placeholder="描述角色的性格、背景、說話習慣..."></textarea>
    
    <button class="save-btn" onclick="saveSettings()">儲存並套用</button>
    <button class="clear-btn" onclick="clearHistory()">清除對話紀錄</button>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="main">
    <div class="app-bar">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <div id="display-name">AI 助手</div>
        <div style="width: 44px;"></div> </div>
    
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="說點什麼..." onkeypress="if(event.key==='Enter')send()">
        <button class="send-btn" onclick="send()">傳送</button>
    </div>
</div>

<script>
    let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [];
    let activeModel = "";

    // 載入設定
    function loadSettings() {
        document.getElementById('apiKey').value = localStorage.getItem('my_ai_key') || "";
        document.getElementById('charName').value = localStorage.getItem('char_name') || "AI 助手";
        document.getElementById('charPrompt').value = localStorage.getItem('char_prompt') || "你是一個親切的助手。";
        document.getElementById('display-name').innerText = document.getElementById('charName').value;
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function saveSettings() {
        localStorage.setItem('my_ai_key', document.getElementById('apiKey').value.trim());
        localStorage.setItem('char_name', document.getElementById('charName').value.trim());
        localStorage.setItem('char_prompt', document.getElementById('charPrompt').value.trim());
        alert("設定已儲存！頁面將重新載入。");
        location.reload();
    }

    function clearHistory() {
        if(confirm("確定要刪除所有對話紀錄嗎？")) {
            localStorage.removeItem('chat_history');
            location.reload();
        }
    }

    async function initModel() {
        const key = localStorage.getItem('my_ai_key');
        if(!key) return;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            if (data.models) {
                const found = data.models.find(m => m.name.includes('flash')) || data.models[0];
                activeModel = found.name;
            }
        } catch (e) {}
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        chatHistory.forEach(msg => {
            addBubble(msg.parts[0].text, msg.role === 'user' ? 'u' : 'a', false);
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const key = localStorage.getItem('my_ai_key');
        if(!key || !activeModel) { alert("請先開啟側邊欄設定 API Key"); return; }
        
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'u');
        input.value = '';

        const userMsg = { role: "user", parts: [{ text: text }] };
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: localStorage.getItem('char_prompt') || "" }] },
                    contents: [...chatHistory, userMsg]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            addBubble(aiText, 'a');
            chatHistory.push(userMsg);
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });
            
            if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
            localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        } catch (e) {
            addBubble("連線出錯，請確認設定是否儲存。", 'a');
        }
    }

    function addBubble(t, type, scroll = true) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = t;
        box.appendChild(div);
        if(scroll) box.scrollTop = box.scrollHeight;
    }

    window.onload = async () => {
        loadSettings();
        renderMessages();
        await initModel();
    };
</script>

</body>
</html>
