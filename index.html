<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 萬能連線版</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .app-bar { background: #34a853; color: white; padding: 16px; font-weight: bold; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; font-size: 16px; line-height: 1.4; }
        .u { align-self: flex-end; background: #34a853; color: white; }
        .a { align-self: flex-start; background: white; color: black; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { background: white; display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #34a853; color: white; border: none; padding: 0 15px; margin-left: 5px; border-radius: 20px; font-weight: bold; }
        #status { font-size: 11px; color: #666; text-align: center; background: #eee; padding: 5px; }
    </style>
</head>
<body>

<div class="app-bar">AI 聊天助手 (全自動偵測)</div>
<div id="status" onclick="setKey()">🔑 點此設定 API Key</div>
<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="隨便說點什麼..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">傳送</button>
</div>

<script>
    let myKey = localStorage.getItem('my_ai_key') || "";
    let activeModel = "";

    async function init() {
        if(!myKey) { document.getElementById('status').innerText = "❌ 請先設定 API Key"; return; }
        document.getElementById('status').innerText = "🔄 正在尋找可用的模型地址...";
        
        // 嘗試從 Google 抓取你的模型清單
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${myKey}`);
            const data = await res.json();
            if (data.models) {
                // 優先找 flash，找不到就找 pro，再找不到就拿第一個
                const found = data.models.find(m => m.name.includes('flash')) || 
                              data.models.find(m => m.name.includes('pro')) || 
                              data.models[0];
                activeModel = found.name;
                document.getElementById('status').innerText = `✅ 已自動連線：${activeModel.split('/').pop()}`;
            } else {
                throw new Error();
            }
        } catch (e) {
            document.getElementById('status').innerText = "❌ 無法自動偵測模型，請確認 Key 是否正確";
        }
    }

    function setKey() {
        const k = prompt("請貼上 API Key (AIza開頭):", myKey);
        if(k) { localStorage.setItem('my_ai_key', k.trim()); location.reload(); }
    }

    async function send() {
        if(!activeModel) { await init(); if(!activeModel) return; }
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'u');
        input.value = '';

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${myKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            addBubble(data.candidates[0].content.parts[0].text, 'a');
        } catch (e) {
            addBubble("連線出錯，請稍後再試。", 'a');
        }
    }

    function addBubble(t, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    init(); // 網頁開啟時自動初始化
</script>

</body>
</html>
