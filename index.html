<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的私人 AI (修正完成版)</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .app-bar { background: #4285f4; color: white; padding: 16px; font-weight: bold; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #4285f4; color: white; }
        .ai { align-self: flex-start; background: white; color: black; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { background: white; display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #4285f4; color: white; border: none; padding: 0 15px; margin-left: 5px; border-radius: 20px; }
        .setup { font-size: 11px; color: #999; text-align: center; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-bar">AI 聊天助手</div>
<div class="setup" onclick="setKey()">⚙️ 設定 API Key</div>
<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="隨便說點什麼..." onkeypress="if(event.key==='Enter')send()">
    <button onclick="send()">傳送</button>
</div>

<script>
    let myKey = localStorage.getItem('my_ai_key') || "";
    if(myKey) addBubble("地址已修正！請試試看聊天。", 'ai');

    function setKey() {
        const k = prompt("請貼上 API Key (AIza開頭):", myKey);
        if(k) { myKey = k.trim(); localStorage.setItem('my_ai_key', myKey); location.reload(); }
    }

    async function send() {
        if(!myKey) { setKey(); return; }
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'user');
        input.value = '';

        try {
            // *** 關鍵修正：從 v1beta 改成 v1 ***
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${myKey}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            
            const data = await res.json();
            
            if (data.candidates && data.candidates[0].content) {
                addBubble(data.candidates[0].content.parts[0].text, 'ai');
            } else {
                // 如果 v1 還是找不到，最後一個保險手段
                addBubble("Google 還是沒找到模型，可能是 API 版本變動。錯誤：" + (data.error ? data.error.message : "未知"), 'ai');
            }
        } catch (e) {
            addBubble("網路連線錯誤，請確認手機網路。", 'ai');
        }
    }

    function addBubble(t, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
