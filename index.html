<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>MINE Personal OS</title>
    <style>
        :root { 
            --bg: #222;
            /* 💡 處理裝置安全區域，避免被瀏海或 Home 條遮擋 */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden; /* 徹底禁止捲動 */
            position: fixed;
        }

        body { 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column;
            /* 💡 修正桌布：確保背景不隨視窗變動而位移 */
            background: #1a2a6c;
            background-image: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover;
            background-position: center center;
            background-attachment: scroll;
        }

        #status-bar {
            padding: calc(var(--safe-top) + 5px) 20px 5px 20px;
            display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.1);
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 10px; padding: 10px 20px;
            box-sizing: border-box;
        }

        .grid-slot {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white; width: 70px;
            touch-action: none;
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.2s;
            will-change: transform;
        }

        /* 💡 解決重複圖示：隱藏原本格位裡的圖示 */
        .source-hidden { opacity: 0; pointer-events: none; }
        
        .icon-box {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dragging {
            opacity: 0.9; transform: scale(1.1) !important;
            position: fixed !important; z-index: 999;
            pointer-events: none;
            transition: none !important;
        }

        #dock {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin: 10px 20px calc(var(--safe-bottom) + 15px) 20px;
            padding: 12px; border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-item { text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" class="dock-item">💬</a>
    <a href="notes.html" class="dock-item">📝</a>
    <a href="gallery.html" class="dock-item">🖼️</a>
    <a href="clock.html" class="dock-item">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('desktop_layout')) || [
        { id: 'chat', name: 'AI 助手', icon: '💬', color: '#4285f4', url: 'chat.html', slot: 0 },
        { id: 'clock', name: '時鐘', icon: '⏰', color: '#ff9800', url: 'clock.html', slot: 1 },
        { id: 'weather', name: '氣象', icon: '☁️', color: '#00bcd4', url: 'weather.html', slot: 2 },
        { id: 'gallery', name: '相簿', icon: '🖼️', color: '#e91e63', url: 'gallery.html', slot: 3 },
        { id: 'notes', name: '備忘錄', icon: '📝', color: '#4caf50', url: 'notes.html', slot: 4 },
        { id: 'archive', name: '記憶倉庫', icon: '🏛️', color: '#673ab7', url: 'archive.html', slot: 5 },
        { id: 'mail', name: '信箱', icon: '✉️', color: '#d44638', url: 'mail.html', slot: 6 }
    ];

    const homeScreen = document.getElementById('home-screen');
    let dragTimeout;
    let isReordering = false;

    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) {
            document.body.style.backgroundImage = `url(${savedWallpaper})`;
        }
    }

    function initDesktop() {
        homeScreen.innerHTML = '';
        appData.sort((a, b) => a.slot - b.slot);
        for (let i = 0; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            const app = appData.find(a => a.slot === i);
            if (app) slot.appendChild(createAppElement(app));
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box" style="background:${app.color};">${app.icon}</div><span style="font-size:12px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false;
        let lastTargetIdx = -1;

        el.addEventListener('touchstart', (e) => {
            dragTimeout = setTimeout(() => {
                isDragging = true;
                if (navigator.vibrate) navigator.vibrate(40);
                
                // 💡 關鍵修復：長按成功後，先讓格位裡的原始圖示消失，避免重複
                el.classList.add('source-hidden');
                
                // 複製一個「影子」來跟隨手指
                const clone = el.cloneNode(true);
                clone.classList.remove('source-hidden');
                clone.classList.add('dragging');
                document.body.appendChild(clone);
                
                window._activeClone = clone;
                const touch = e.touches[0];
                updateClonePos(touch.clientX, touch.clientY);
            }, 500);
        }, {passive: true});

        function updateClonePos(x, y) {
            if(window._activeClone) {
                window._activeClone.style.left = x - 35 + 'px';
                window._activeClone.style.top = y - 35 + 'px';
            }
        }

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) return clearTimeout(dragTimeout);
            const touch = e.touches[0];
            updateClonePos(touch.clientX, touch.clientY);

            if (isReordering) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.grid-slot');
            
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== lastTargetIdx && targetIdx < appData.length) {
                    lastTargetIdx = targetIdx;
                    isReordering = true;
                    realTimeReorder(el.dataset.id, targetIdx);
                    setTimeout(() => { isReordering = false; }, 80); 
                }
            }
            if (e.cancelable) e.preventDefault();
        }, {passive: false});

        el.addEventListener('touchend', () => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            if(window._activeClone) {
                window._activeClone.remove();
                window._activeClone = null;
            }
            localStorage.setItem('desktop_layout', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    function realTimeReorder(movingId, targetIdx) {
        const allAppElements = document.querySelectorAll('.app-icon:not(.dragging)');
        const firstPositions = {};
        allAppElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            firstPositions[el.dataset.id] = { x: rect.left, y: rect.top };
        });

        const movingApp = appData.find(a => a.id === movingId);
        let others = appData.filter(a => a.id !== movingId).sort((a, b) => a.slot - b.slot);
        others.splice(targetIdx, 0, movingApp);
        others.forEach((app, index) => app.slot = index);
        appData = others;

        const slots = document.querySelectorAll('.grid-slot');
        appData.forEach(app => {
            const appEl = document.querySelector(`.app-icon[data-id="${app.id}"]`);
            if (appEl) slots[app.slot].appendChild(appEl);
        });

        requestAnimationFrame(() => {
            allAppElements.forEach(el => {
                const id = el.dataset.id;
                if (!firstPositions[id]) return;
                const rect = el.getBoundingClientRect();
                const deltaX = firstPositions[id].x - rect.left;
                const deltaY = firstPositions[id].y - rect.top;
                if (deltaX !== 0 || deltaY !== 0) {
                    el.style.transition = 'none';
                    el.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                    el.offsetWidth; 
                    el.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                    el.style.transform = 'translate(0, 0)';
                }
            });
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.onload = () => {
        updateTime();
        loadWallpaper();
        initDesktop();
        setInterval(updateTime, 1000);
    };
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
