<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 診斷工具</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; padding: 20px; }
        .box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #4285f4; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; margin-top: 10px; font-weight: bold; }
        #log { background: #333; color: #0f0; padding: 10px; border-radius: 5px; margin-top: 20px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h3>最後偵錯測試</h3>
    <button class="btn" onclick="setKey()">1. 貼上 API Key</button>
    <button class="btn" style="background:#34a853" onclick="testConnection()">2. 點擊測試連線</button>
</div>

<div id="log">測試日誌會顯示在這裡...</div>

<script>
    function setKey() {
        const k = prompt("請貼上 API Key (AIza 開頭):");
        if(k) { localStorage.setItem('my_key', k.trim()); alert("已儲存！"); }
    }

    async function testConnection() {
        const log = document.getElementById('log');
        const key = localStorage.getItem('my_key');
        if(!key) { log.innerText = "錯誤：你還沒設定 API Key！"; return; }
        
        log.innerText = "正在連線到 Google 伺服器...\n";

        // 我們直接測最穩定的 1.5-flash 網址
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Hi" }] }] })
            });

            const data = await res.json();
            log.innerText += "--- 收到 Google 的回應 ---\n" + JSON.stringify(data, null, 2);
        } catch (e) {
            log.innerText += "--- 網路層級錯誤 (通常是廣告攔截或網路擋掉) ---\n" + e.toString();
        }
    }
</script>

</body>
</html>
