<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINE - 桌面</title>
    <style>
        :root { --grid-cols: 4; --item-size: 70px; --gap: 20px; }
        body { 
            margin: 0; background: #222; overflow: hidden; 
            font-family: sans-serif; height: 100vh;
        }
        
        /* 桌面容器：使用絕對定位計算 */
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 100px); /* 扣掉下方 Dock */
            padding: 20px;
            box-sizing: border-box;
        }

        .app-icon {
            position: absolute; /* 關鍵：絕對定位才能想放哪就放哪 */
            width: var(--item-size);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s, opacity 0.1s;
            cursor: grab;
            z-index: 1;
            touch-action: none; /* 防止手機瀏覽器干擾拖移 */
        }

        .app-icon img {
            width: 60px; height: 60px; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none; /* 防止圖片被當成拖拽對象 */
        }

        .app-icon span {
            color: white; font-size: 12px; margin-top: 5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .dragging { opacity: 0.5; z-index: 100; transform: scale(1.1); cursor: grabbing; }

        /* 隱形格線導引 (開發調適用，可刪除) */
        .grid-slot {
            position: absolute;
            width: var(--item-size);
            height: 90px;
            border: 1px dashed rgba(255,255,255,0.1);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="desktop"></div>

<script>
    const desktop = document.getElementById('desktop');
    const COLS = 4;
    const SLOT_W = 85; // 每一格的寬度
    const SLOT_H = 100; // 每一格的高度

    // 模擬 APP 數據 (增加 pos 欄位記錄位置)
    let apps = JSON.parse(localStorage.getItem('desktop_apps')) || [
        { id: 'chat', name: 'MINE AI', icon: 'https://cdn-icons-png.flaticon.com/512/1698/1698535.png', url: 'chat.html', x: 0, y: 0 },
        { id: 'archive', name: '記憶倉庫', icon: 'https://cdn-icons-png.flaticon.com/512/2991/2991108.png', url: 'archive.html', x: 1, y: 0 },
        { id: 'mail', name: '信箱', icon: 'https://cdn-icons-png.flaticon.com/512/561/561127.png', url: 'mail.html', x: 2, y: 0 }
    ];

    function renderDesktop() {
        desktop.innerHTML = '';
        apps.forEach((app, index) => {
            const div = document.createElement('div');
            div.className = 'app-icon';
            div.innerHTML = `<img src="${app.icon}"><span>${app.name}</span>`;
            
            // 計算位置
            updateAppPosition(div, app.x, app.y);

            // 綁定拖移事件
            setupDrag(div, index);
            
            div.onclick = (e) => { if(!div.classList.contains('moved')) window.location.href = app.url; };
            desktop.appendChild(div);
        });
    }

    function updateAppPosition(el, x, y) {
        el.style.left = `${x * SLOT_W + 20}px`;
        el.style.top = `${y * SLOT_H + 20}px`;
    }

    function setupDrag(el, index) {
        let isDragging = false;
        let startX, startY;
        let originalX, originalY;

        el.onpointerdown = (e) => {
            isDragging = true;
            el.classList.add('dragging');
            el.classList.remove('moved');
            startX = e.clientX - el.offsetLeft;
            startY = e.clientY - el.offsetTop;
            el.setPointerCapture(e.pointerId);
        };

        el.onpointermove = (e) => {
            if (!isDragging) return;
            el.classList.add('moved');
            let x = e.clientX - startX;
            let y = e.clientY - startY;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
        };

        el.onpointerup = (e) => {
            if (!isDragging) return;
            isDragging = false;
            el.classList.remove('dragging');

            // 計算最接近哪一個格子 (Snap to Grid)
            const gridX = Math.round((e.clientX - startX - 20) / SLOT_W);
            const gridY = Math.round((e.clientY - startY - 20) / SLOT_H);

            // 邊界檢查 (防止移出螢幕)
            const finalX = Math.max(0, Math.min(COLS - 1, gridX));
            const finalY = Math.max(0, gridY);

            // 檢查該位置是否已有 APP (選配：如果要重疊就不用這段)
            apps[index].x = finalX;
            apps[index].y = finalY;

            localStorage.setItem('desktop_apps', JSON.stringify(apps));
            renderDesktop();
        };
    }

    function updateAppPosition(el, x, y) {
        el.style.left = `${x * SLOT_W + 20}px`;
        el.style.top = `${y * SLOT_H + 20}px`;
    }

    renderDesktop();
</script>

</body>
</html>
