<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>C²s PHONE</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom);
            --color-a: #4285f4; 
            --color-b: #1a2a6c; 
        }
        
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: auto; background: #1a2a6c; }
        
        body { 
            color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column;
            background-color: var(--color-a);
            background-image: linear-gradient(180deg, var(--color-a), var(--color-b));
            background-size: cover; background-position: center;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        }

        #status-bar {
            padding: calc(var(--safe-top) + 5px) 20px 10px 20px;
            display: flex; justify-content: space-between; font-size: 14px;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; flex-shrink: 0;
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(6, 1fr); 
            gap: 10px; padding: 10px 20px; box-sizing: border-box;
        }

        .grid-slot { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .app-icon { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; width: 100%; touch-action: none; }
        .source-hidden { opacity: 0 !important; visibility: hidden; }
        
        .icon-box { 
            width: 55px; height: 55px; border-radius: 14px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 28px; margin-bottom: 4px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, var(--color-a), var(--color-b)) !important; 
        }

        .dragging { 
            opacity: 0.9 !important;
            transform: translateZ(0) scale(1.08) !important;
            transform-origin: top left !important;
            position: fixed !important;
            left: 0; top: 0;
            z-index: 9999 !important;
            pointer-events: none !important;
            transition: none !important;
            margin: 0 !important;
            will-change: transform, left, top;
        }

        #dock { background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin: 0 20px calc(var(--safe-bottom) + 15px) 20px; padding: 12px; border-radius: 30px; display: flex; justify-content: space-around; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" style="text-decoration:none; font-size:26px;">💬</a>
    <a href="notes.html" style="text-decoration:none; font-size:26px;">📝</a>
    <a href="gallery.html" style="text-decoration:none; font-size:26px;">🖼️</a>
    <a href="clock.html" style="text-decoration:none; font-size:26px;">⏰</a>
    <div onclick="location.reload()" style="cursor:pointer; font-size:26px;">🏠</div>
</div>

<script>
    function getAppData() {
        // ✨ 你可以在這裡直接修改 App 的顯示名稱或圖示
        const defaultApps = [
            { id: 'chat', name: 'MINE', icon: '💬', url: 'chat.html' },
            { id: 'clock', name: '時間', icon: '⏰', url: 'clock.html' },
            { id: 'weather', name: '天氣', icon: '☁️', url: 'weather.html' },
            { id: 'gallery', name: '相簿', icon: '🖼️', url: 'gallery.html' },
            { id: 'notes', name: '備忘錄', icon: '📝', url: 'notes.html' },
            { id: 'settings', name: '主題', icon: '🎨', url: 'settings.html' },
            { id: 'archive', name: '記憶倉庫', icon: '🏛️', url: 'archive.html' },
            { id: 'mail', name: '信箱', icon: '✉️', url: 'mail.html' }
        ];

        let currentData = localStorage.getItem('desktop_layout_ordered');
        
        if (currentData) {
            let parsed = JSON.parse(currentData);

            // ✨ 強制同步機制：用 defaultApps 的最新名稱/圖示覆蓋舊資料，但保留排序
            const updatedData = parsed.map(savedApp => {
                const latest = defaultApps.find(d => d.id === savedApp.id);
                // 如果在最新的清單裡找得到，就更新名稱和圖示
                return latest ? { ...savedApp, name: latest.name, icon: latest.icon, url: latest.url } : savedApp;
            });

            // 檢查是否有新增加的 App（不在舊資料裡的）
            defaultApps.forEach(defApp => {
                if (!updatedData.some(a => a.id === defApp.id)) {
                    updatedData.push(defApp);
                }
            });

            // 將更新後的名稱存回快取，確保下次也是最新
            localStorage.setItem('desktop_layout_ordered', JSON.stringify(updatedData));
            return updatedData;
        }
        
        return defaultApps;
    }

    let appData = getAppData();
    const homeScreen = document.getElementById('home-screen');
    let dragTimeout, offsetX = 0, offsetY = 0, isReordering = false;

    function applyThemeAndWallpaper() {
        const iconColorA = localStorage.getItem('theme_color_a') || '#4285f4';
        const iconColorB = localStorage.getItem('theme_color_b') || '#1a2a6c';
        document.documentElement.style.setProperty('--color-a', iconColorA);
        document.documentElement.style.setProperty('--color-b', iconColorB);
        
        const bgColorA = localStorage.getItem('bg_color_a') || iconColorA;
        const bgColorB = localStorage.getItem('bg_color_b') || iconColorB;
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        const bgStyle = localStorage.getItem('bg_style') || 'gradient';

        if (savedWallpaper) {
            document.body.style.backgroundImage = `url(${savedWallpaper})`;
        } else {
            if (bgStyle === 'gradient') {
                document.body.style.backgroundImage = `linear-gradient(180deg, ${bgColorA}, ${bgColorB})`;
            } else {
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = bgColorA;
            }
        }
    }

    document.addEventListener('touchmove', (e) => {
        if (window._activeClone) { if (e.cancelable) e.preventDefault(); }
    }, {passive: false});

    function initDesktop() {
        homeScreen.innerHTML = '';
        appData.forEach((app, index) => {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = index;
            slot.appendChild(createAppElement(app));
            homeScreen.appendChild(slot);
        });
        for (let i = appData.length; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot'; slot.dataset.index = i;
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box">${app.icon}</div><span style="font-size:10px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false, lastTargetIdx = -1;
        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = el.getBoundingClientRect();
            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;
            dragTimeout = setTimeout(() => {
                isDragging = true;
                const clone = el.cloneNode(true);
                clone.classList.add('dragging');
                clone.style.width = rect.width + 'px';
                clone.style.height = rect.height + 'px';
                clone.style.left = (touch.clientX - offsetX) + 'px';
                clone.style.top = (touch.clientY - offsetY) + 'px';
                document.body.appendChild(clone);
                window._activeClone = clone;
                el.classList.add('source-hidden');
                lastTargetIdx = appData.findIndex(a => a.id === el.dataset.id);
            }, 500);
        }, {passive: true});

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) return clearTimeout(dragTimeout);
            const touch = e.touches[0];
            if(window._activeClone) {
                window._activeClone.style.left = (touch.clientX - offsetX) + 'px';
                window._activeClone.style.top = (touch.clientY - offsetY) + 'px';
            }
            if (isReordering) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.grid-slot');
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== -1 && targetIdx !== lastTargetIdx && targetIdx < appData.length) {
                    lastTargetIdx = targetIdx;
                    isReordering = true;
                    realTimeReflow(el.dataset.id, targetIdx);
                    setTimeout(() => { isReordering = false; }, 120); 
                }
            }
        }, {passive: false});

        el.addEventListener('touchend', () => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            if(window._activeClone) window._activeClone.remove();
            window._activeClone = null;
            localStorage.setItem('desktop_layout_ordered', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    function realTimeReflow(movingId, targetIdx) {
        const allIcons = document.querySelectorAll('.app-icon:not(.dragging)');
        const firstPos = {};
        allIcons.forEach(icon => {
            const rect = icon.getBoundingClientRect();
            firstPos[icon.dataset.id] = { x: rect.left, y: rect.top };
        });
        const movingItem = appData.find(a => a.id === movingId);
        const oldIdx = appData.indexOf(movingItem);
        appData.splice(oldIdx, 1);
        appData.splice(targetIdx, 0, movingItem);
        const slots = document.querySelectorAll('.grid-slot');
        appData.forEach((app, index) => {
            const appEl = document.querySelector(`.app-icon[data-id="${app.id}"]`);
            if (appEl) slots[index].appendChild(appEl);
        });
        requestAnimationFrame(() => {
            allIcons.forEach(icon => {
                const id = icon.dataset.id;
                const rect = icon.getBoundingClientRect();
                const dx = (firstPos[id]?.x || 0) - rect.left;
                const dy = (firstPos[id]?.y || 0) - rect.top;
                if (dx !== 0 || dy !== 0) {
                    icon.style.transition = 'none';
                    icon.style.transform = `translate(${dx}px, ${dy}px)`;
                    icon.offsetWidth; 
                    icon.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                    icon.style.transform = 'translate(0, 0)';
                }
            });
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.onload = () => { 
        updateTime(); 
        applyThemeAndWallpaper(); 
        initDesktop(); 
        setInterval(updateTime, 1000); 
    };
</script>
</body>
</html>
