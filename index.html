<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>MINE Personal OS</title>
    <style>
        :root { --bg: #222; }
        body { 
            margin: 0; color: white; 
            font-family: -apple-system, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            /* 桌布設定 - 恢復預設，避免 JS 載入前空白 */
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover; background-position: center;
            overflow-y: auto; overflow-x: hidden;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        #status-bar {
            padding: 10px 20px; display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 15px; padding: 20px;
            position: relative;
            min-height: 85vh; /* 確保內容撐開以便下拉刷新 */
        }

        .grid-slot {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white; width: 70px; z-index: 10;
            touch-action: none;
            /* 讓所有 App 預設擁有平移動畫，這是絲滑感的來源 */
            transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform; /* 告訴瀏覽器優化這個屬性 */
        }
        
        .icon-box {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 正在被拖移的 App：不要動畫，必須絕對跟手 */
        .dragging {
            opacity: 0.8; transform: scale(1.15) !important;
            position: fixed !important; z-index: 999;
            pointer-events: none;
            transition: none !important; /* 強制關閉動畫 */
        }

        #dock {
            background: rgba(255,255,255,0.25); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            margin: 20px; padding: 12px; border-radius: 28px;
            display: flex; justify-content: space-around; align-items: center;
            position: sticky; bottom: 20px;
        }
        .dock-item { text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" class="dock-item">💬</a>
    <a href="notes.html" class="dock-item">📝</a>
    <a href="gallery.html" class="dock-item">🖼️</a>
    <a href="clock.html" class="dock-item">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('desktop_layout')) || [
        { id: 'chat', name: 'AI 助手', icon: '💬', color: '#4285f4', url: 'chat.html', slot: 0 },
        { id: 'clock', name: '時鐘', icon: '⏰', color: '#ff9800', url: 'clock.html', slot: 1 },
        { id: 'weather', name: '氣象', icon: '☁️', color: '#00bcd4', url: 'weather.html', slot: 2 },
        { id: 'gallery', name: '相簿', icon: '🖼️', color: '#e91e63', url: 'gallery.html', slot: 3 },
        { id: 'notes', name: '備忘錄', icon: '📝', color: '#4caf50', url: 'notes.html', slot: 4 },
        { id: 'archive', name: '記憶倉庫', icon: '🏛️', color: '#673ab7', url: 'archive.html', slot: 5 },
        { id: 'mail', name: '信箱', icon: '✉️', color: '#d44638', url: 'mail.html', slot: 6 }
    ];

    const homeScreen = document.getElementById('home-screen');
    let dragTimeout;

    // --- 復活桌布函數 ---
    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) {
            document.body.style.backgroundImage = `url(${savedWallpaper})`;
        }
    }

    function initDesktop() {
        homeScreen.innerHTML = '';
        appData.sort((a, b) => a.slot - b.slot);
        
        for (let i = 0; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            const app = appData.find(a => a.slot === i);
            if (app) slot.appendChild(createAppElement(app));
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box" style="background:${app.color};">${app.icon}</div><span style="font-size:12px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false;
        let lastTargetIdx = -1;

        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (window.scrollY > 10) return; // 如果沒在頁面頂端，不觸發拖移，讓給下拉刷新

            dragTimeout = setTimeout(() => {
                isDragging = true;
                if (navigator.vibrate) navigator.vibrate(40);
                el.classList.add('dragging');
                document.body.appendChild(el);
                moveAt(touch.clientX, touch.clientY);
            }, 500);
        }, {passive: true});

        function moveAt(pageX, pageY) {
            el.style.left = pageX - 35 + 'px';
            el.style.top = pageY - 35 + 'px';

            const target = document.elementFromPoint(pageX, pageY);
            const slot = target?.closest('.grid-slot');
            
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== lastTargetIdx && targetIdx < appData.length) {
                    lastTargetIdx = targetIdx;
                    realTimeReorderWithFlip(el.dataset.id, targetIdx);
                }
            }
        }

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) {
                clearTimeout(dragTimeout);
                return;
            }
            const touch = e.touches[0];
            moveAt(touch.clientX, touch.clientY);
            if (e.cancelable) e.preventDefault();
        }, {passive: false});

        el.addEventListener('touchend', (e) => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            el.classList.remove('dragging');
            localStorage.setItem('desktop_layout', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    // --- 🏆 核心黑科技：FLIP Animation 絲滑平移 ---
    function realTimeReorderWithFlip(movingId, targetIdx) {
        const allAppElements = document.querySelectorAll('.app-icon:not(.dragging)');
        
        // 1. First: 記錄所有 App 的初始位置 (座標)
        const firstPositions = {};
        allAppElements.forEach(el => {
            const rect = el.getBoundingClientRect();
            firstPositions[el.dataset.id] = { x: rect.left, y: rect.top };
        });

        // 2. 核心：在數據層重新洗牌 (Data reordering)
        const movingApp = appData.find(a => a.id === movingId);
        let others = appData.filter(a => a.id !== movingId).sort((a, b) => a.slot - b.slot);
        others.splice(targetIdx, 0, movingApp);
        
        others.forEach((app, index) => {
            app.slot = index;
        });
        appData = others;

        // 3. 核心：重排 DOM 元素位置
        const slots = document.querySelectorAll('.grid-slot');
        appData.forEach(app => {
            const appEl = document.querySelector(`.app-icon[data-id="${app.id}"]`);
            if (appEl && !appEl.classList.contains('dragging')) {
                slots[app.slot].appendChild(appEl);
            }
        });

        // 4. Last & Invert: 計算誤差並施加反向動畫
        requestAnimationFrame(() => {
            allAppElements.forEach(el => {
                const id = el.dataset.id;
                const rect = el.getBoundingClientRect();
                
                // 計算它「滑過來」之前的舊位置誤差
                const deltaX = firstPositions[id].x - rect.left;
                const deltaY = firstPositions[id].y - rect.top;

                if (deltaX !== 0 || deltaY !== 0) {
                    // 暫時關閉 transition，將其「閃現」回舊位置
                    el.style.transition = 'none';
                    el.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                    
                    // 強制重繪 (Recalculate layout)
                    el.offsetWidth; 
                    
                    // 恢復 transition，讓它用滑的方式回到 0,0
                    el.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                    el.style.transform = 'translate(0, 0)';
                }
            });
        });
    }

    // --- 時間與系統功能 ---
    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.onload = function() {
        updateTime();
        loadWallpaper(); // 復活！載入桌布喵
        initDesktop();
        setInterval(updateTime, 1000);
    };

    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
