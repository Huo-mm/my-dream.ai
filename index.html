<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>My Personal OS</title>
    <style>
        :root { --bg: #222; }
        body { 
            margin: 0; color: white; 
            font-family: -apple-system, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover; background-position: center;
            overflow: hidden;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        #status-bar {
            padding: 10px 20px; display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.1);
        }

        /* 桌面核心：4x6 格線佈局 */
        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(6, 1fr); /* 4x6 框架 */
            gap: 15px; padding: 20px;
            position: relative;
        }

        /* 隱形的格位容器 */
        .grid-slot {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white;
            width: 70px; z-index: 10;
            touch-action: none; /* 禁用預設觸摸行為以便拖拽 */
        }
        
        .icon-box {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        /* 拖移時的樣式 */
        .dragging {
            opacity: 0.8; transform: scale(1.1);
            position: fixed !important; z-index: 999;
            pointer-events: none;
        }

        #dock {
            background: rgba(255,255,255,0.25); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            margin: 20px; padding: 12px; border-radius: 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-item { text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen">
    </div>

<div id="dock">
    <a href="chat.html" class="dock-item">💬</a>
    <a href="notes.html" class="dock-item">📝</a>
    <a href="gallery.html" class="dock-item">🖼️</a>
    <a href="clock.html" class="dock-item">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    // App 數據與其位置 (slotIndex 0-23)
    let appData = JSON.parse(localStorage.getItem('desktop_layout')) || [
        { id: 'chat', name: 'AI 助手', icon: '💬', color: '#4285f4', url: 'chat.html', slot: 0 },
        { id: 'clock', name: '時鐘', icon: '⏰', color: '#ff9800', url: 'clock.html', slot: 1 },
        { id: 'weather', name: '氣象', icon: '☁️', color: '#00bcd4', url: 'weather.html', slot: 2 },
        { id: 'gallery', name: '相簿', icon: '🖼️', color: '#e91e63', url: 'gallery.html', slot: 3 },
        { id: 'notes', name: '備忘錄', icon: '📝', color: '#4caf50', url: 'notes.html', slot: 4 },
        { id: 'archive', name: '記憶倉庫', icon: '🏛️', color: '#673ab7', url: 'archive.html', slot: 5 },
        { id: 'mail', name: '信箱', icon: '✉️', color: '#d44638', url: 'mail.html', slot: 6 }
    ];

    const homeScreen = document.getElementById('home-screen');

    function initDesktop() {
        homeScreen.innerHTML = '';
        // 生成 24 個格位 (4欄 x 6列)
        for (let i = 0; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            
            // 檢查此格位是否有 App
            const app = appData.find(a => a.slot === i);
            if (app) {
                const appEl = createAppElement(app);
                slot.appendChild(appEl);
            }
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url;
        a.className = 'app-icon';
        a.dataset.id = app.id;
        a.innerHTML = `
            <div class="icon-box" style="background: ${app.color};">${app.icon}</div>
            <span style="font-size: 12px;">${app.name}</span>
        `;

        // 綁定自定義拖拽邏輯
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false;
        let startX, startY;
        let originalParent;

        el.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            
            // 長按 500ms 開啟拖拽
            dragTimeout = setTimeout(() => {
                isDragging = true;
                originalParent = el.parentElement;
                el.classList.add('dragging');
                document.body.appendChild(el);
                moveAt(touch.clientX, touch.clientY);
            }, 500);
        }, {passive: true});

        function moveAt(pageX, pageY) {
            el.style.left = pageX - 35 + 'px';
            el.style.top = pageY - 35 + 'px';
        }

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) {
                clearTimeout(dragTimeout);
                return;
            }
            const touch = e.touches[0];
            moveAt(touch.clientX, touch.clientY);
        });

        el.addEventListener('touchend', (e) => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            el.classList.remove('dragging');
            el.style.left = ''; el.style.top = '';

            // 尋找放開位置下方的格位
            const touch = e.changedTouches[0];
            const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = dropTarget?.closest('.grid-slot');

            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                // 檢查目標位置是否已有 App
                const existingApp = appData.find(a => a.slot === targetIdx);
                const currentApp = appData.find(a => a.id === el.dataset.id);

                if (!existingApp) {
                    currentApp.slot = targetIdx;
                } else {
                    // 如果有 App，可以選擇交換位置
                    existingApp.slot = currentApp.slot;
                    currentApp.slot = targetIdx;
                }
                localStorage.setItem('desktop_layout', JSON.stringify(appData));
            }
            initDesktop(); // 重新渲染
        });
    }

    // 更新時間等原有的系統功能...
    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) {
            document.body.style.backgroundImage = `url(${savedWallpaper})`;
        }
    }

    window.onload = function() {
        updateTime();
        loadWallpaper();
        initDesktop();
        setInterval(updateTime, 1000);
    };

    // 禁止右鍵
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
