<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Personal OS</title>
    <style>
        :root { --bg: #222; }
        body { 
            margin: 0; color: white; 
            font-family: -apple-system, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        #status-bar {
            padding: 10px 20px; display: flex; justify-content: space-between;
            font-size: 14px; font-weight: bold;
            background: rgba(0,0,0,0.1);
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; padding: 30px; align-content: start;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white;
        }
        .icon-box {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .icon-box:active { transform: scale(0.9); }

        #dock {
            background: rgba(255,255,255,0.25); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            margin: 20px; padding: 12px; border-radius: 28px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .dock-item { text-decoration: none; font-size: 26px; cursor: pointer; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen">
    <a href="chat.html" class="app-icon">
        <div class="icon-box" style="background: #4285f4;">💬</div>
        <span style="font-size: 12px;">AI 助手</span>
    </a>

    <a href="clock.html" class="app-icon">
        <div class="icon-box" style="background: #ff9800;">⏰</div>
        <span style="font-size: 12px;">時鐘</span>
    </a>

    <a href="weather.html" class="app-icon">
        <div class="icon-box" style="background: #00bcd4;">☁️</div>
        <span style="font-size: 12px;">氣象</span>
    </a>

    <a href="gallery.html" class="app-icon">
        <div class="icon-box" style="background: #e91e63;">🖼️</div>
        <span style="font-size: 12px;">相簿</span>
    </a>

    <a href="notes.html" class="app-icon">
        <div class="icon-box" style="background: #4caf50;">📝</div>
        <span style="font-size: 12px;">備忘錄</span>
    </a>

    <a href="archive.html" class="app-icon">
        <div class="icon-box" style="background: #673ab7;">🏛️</div>
        <span style="font-size: 12px;">記憶倉庫</span>
    </a>
</div>

<div id="dock">
    <a href="chat.html" class="dock-item" title="AI助手">💬</a>
    <a href="notes.html" class="dock-item" title="備忘錄">📝</a>
    <a href="gallery.html" class="dock-item" title="相簿">🖼️</a>
    <a href="clock.html" class="dock-item" title="時鐘">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) {
            document.body.style.backgroundImage = `url(${savedWallpaper})`;
        }
    }

    function checkAlarmsOnHome() {
        const alarms = JSON.parse(localStorage.getItem('my_alarms') || "[]");
        const now = new Date();
        const currentHM = now.getHours().toString().padStart(2, '0') + ":" + 
                          now.getMinutes().toString().padStart(2, '0');

        let changed = false;
        alarms.forEach(alarm => {
            if (alarm.active && alarm.time === currentHM) {
                alarm.active = false;
                changed = true;
                setTimeout(() => {
                    alert(`⏰ 鬧鐘提醒：現在是 ${currentHM} 喵！`);
                }, 100);
            }
        });

        if (changed) {
            localStorage.setItem('my_alarms', JSON.stringify(alarms));
        }
    }

    window.onload = function() {
        updateTime();
        loadWallpaper();
        checkAlarmsOnHome();
        
        setInterval(updateTime, 1000);
        setInterval(checkAlarmsOnHome, 1000);
    };

    window.addEventListener('storage', (e) => {
        if (e.key === 'active_wallpaper') {
            loadWallpaper();
        }
    });
</script>
</body>
</html>
