<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>MINE Personal OS</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        /* 💡 核心修復：徹底鎖定 body 高度，不讓內容撐開 */
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            overflow: hidden; /* 預設禁止滾動 */
        }

        body { 
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column;
            background: #1a2a6c;
            background-image: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover; background-position: center;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        #status-bar {
            padding: calc(var(--safe-top) + 5px) 20px 10px 20px;
            display: flex; justify-content: space-between; font-size: 14px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; flex-shrink: 0; /* 狀態列不縮小 */
        }

        #home-screen {
            flex: 1; /* 💡 自動填滿中間所有空間 */
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(6, 1fr); /* 💡 確保格位均分高度，不超出螢幕 */
            gap: 10px; padding: 10px 20px;
            box-sizing: border-box;
            overflow: hidden; /* 防止格位內容溢出 */
        }

        .grid-slot {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white; width: 100%;
            touch-action: none;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: transform;
        }

        .source-hidden { opacity: 0 !important; }
        
        .icon-box {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; margin-bottom: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dragging {
            opacity: 0.8; transform: scale(1.1) !important;
            position: fixed !important; z-index: 9999;
            pointer-events: none; transition: none !important;
        }

        #dock {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin: 0 20px calc(var(--safe-bottom) + 15px) 20px;
            padding: 12px; border-radius: 30px;
            display: flex; justify-content: space-around;
            flex-shrink: 0; /* Dock 不縮小 */
        }
        .dock-item { text-decoration: none; font-size: 26px; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" class="dock-item">💬</a>
    <a href="notes.html" class="dock-item">📝</a>
    <a href="gallery.html" class="dock-item">🖼️</a>
    <a href="clock.html" class="dock-item">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('desktop_layout_ordered')) || [
        { id: 'chat', name: 'AI 助手', icon: '💬', color: '#4285f4', url: 'chat.html' },
        { id: 'clock', name: '時鐘', icon: '⏰', color: '#ff9800', url: 'clock.html' },
        { id: 'weather', name: '氣象', icon: '☁️', color: '#00bcd4', url: 'weather.html' },
        { id: 'gallery', name: '相簿', icon: '🖼️', color: '#e91e63', url: 'gallery.html' },
        { id: 'notes', name: '備忘錄', icon: '📝', color: '#4caf50', url: 'notes.html' },
        { id: 'archive', name: '記憶倉庫', icon: '🏛️', color: '#673ab7', url: 'archive.html' },
        { id: 'mail', name: '信箱', icon: '✉️', color: '#d44638', url: 'mail.html' }
    ];

    const homeScreen = document.getElementById('home-screen');
    let dragTimeout;
    let isReordering = false;

    // 💡 下拉重新整理的特殊處理：
    // 我們平時鎖定 body，只有當手指在頂部向下划動時，才允許短暫的滾動效果以觸發刷新。
    let startY = 0;
    document.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
        const moveY = e.touches[0].pageY;
        // 如果不是在下拉（也就是往上滑或是在拖移），就徹底禁止
        if (moveY < startY && !window._activeClone) {
            if (e.cancelable) e.preventDefault();
        }
    }, {passive: false});

    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) document.body.style.backgroundImage = `url(${savedWallpaper})`;
    }

    function initDesktop() {
        homeScreen.innerHTML = '';
        appData.forEach((app, index) => {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = index;
            slot.appendChild(createAppElement(app));
            homeScreen.appendChild(slot);
        });
        for (let i = appData.length; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box" style="background:${app.color};">${app.icon}</div><span style="font-size:10px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false;
        let lastTargetIdx = -1;

        el.addEventListener('touchstart', (e) => {
            dragTimeout = setTimeout(() => {
                isDragging = true;
                if (navigator.vibrate) navigator.vibrate(40);
                el.classList.add('source-hidden');
                const clone = el.cloneNode(true);
                clone.classList.remove('source-hidden');
                clone.classList.add('dragging');
                document.body.appendChild(clone);
                window._activeClone = clone;
                updateClonePos(e.touches[0].clientX, e.touches[0].clientY);
                lastTargetIdx = appData.findIndex(a => a.id === el.dataset.id);
            }, 500);
        }, {passive: true});

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();
            const touch = e.touches[0];
            updateClonePos(touch.clientX, touch.clientY);

            if (isReordering) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.grid-slot');
            
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== -1 && targetIdx !== lastTargetIdx && targetIdx < appData.length) {
                    lastTargetIdx = targetIdx;
                    isReordering = true;
                    realTimeReflow(el.dataset.id, targetIdx);
                    setTimeout(() => { isReordering = false; }, 120); 
                }
            }
        }, {passive: false});

        el.addEventListener('touchend', () => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            if(window._activeClone) window._activeClone.remove();
            localStorage.setItem('desktop_layout_ordered', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    function updateClonePos(x, y) {
        if(window._activeClone) {
            window._activeClone.style.left = x - 35 + 'px';
            window._activeClone.style.top = y - 35 + 'px';
        }
    }

    function realTimeReflow(movingId, targetIdx) {
        const allIcons = document.querySelectorAll('.app-icon:not(.dragging)');
        const firstPositions = {};
        allIcons.forEach(icon => {
            const rect = icon.getBoundingClientRect();
            firstPositions[icon.dataset.id] = { x: rect.left, y: rect.top };
        });

        const movingItem = appData.find(a => a.id === movingId);
        const oldIdx = appData.indexOf(movingItem);
        appData.splice(oldIdx, 1);
        appData.splice(targetIdx, 0, movingItem);

        const slots = document.querySelectorAll('.grid-slot');
        appData.forEach((app, index) => {
            const appEl = document.querySelector(`.app-icon[data-id="${app.id}"]`);
            if (appEl) slots[index].appendChild(appEl);
        });

        requestAnimationFrame(() => {
            allIcons.forEach(icon => {
                const id = icon.dataset.id;
                const rect = icon.getBoundingClientRect();
                const deltaX = firstPositions[id].x - rect.left;
                const deltaY = firstPositions[id].y - rect.top;
                if (deltaX !== 0 || deltaY !== 0) {
                    icon.style.transition = 'none';
                    icon.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                    icon.offsetWidth; 
                    icon.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
                    icon.style.transform = 'translate(0, 0)';
                }
            });
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.onload = () => {
        updateTime(); loadWallpaper(); initDesktop();
        setInterval(updateTime, 1000);
    };
    document.addEventListener('selectstart', (e) => e.preventDefault());
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
