<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>C²s PHONE</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom);
            --color-a: #4285f4; 
            --color-b: #1a2a6c; 
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a2a6c; }

        body { 
            color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column;
            background-color: var(--color-a);
            background-image: linear-gradient(180deg, var(--color-a), var(--color-b));
            background-size: cover; background-position: center;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        }

        #status-bar {
            padding: calc(var(--safe-top) + 5px) 20px 10px 20px;
            display: flex; justify-content: space-between; font-size: 14px;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; flex-shrink: 0;
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 15px; padding: 20px; box-sizing: border-box;
            grid-auto-flow: dense; /* 重要：讓小圖標能自動填補大組件留下的空隙 */
        }

        .grid-slot { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; min-height: 80px; }
        
        /* App 圖示樣式 */
        .app-icon { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: white; width: 100%; touch-action: none; transition: transform 0.2s; }
        .icon-box { 
            width: 55px; height: 55px; border-radius: 14px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 28px; margin-bottom: 4px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, var(--color-a), var(--color-b)); 
        }

        /* 桌寵專屬樣式 (2x2 網格) */
        .pet-widget {
            grid-column: span 2; grid-row: span 2;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative; cursor: grab; touch-action: none; z-index: 10;
        }
        .pet-widget img { 
            width: 120px; height: 120px; /* 放大桌寵 */
            object-fit: contain; pointer-events: none; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        /* 拖移與動畫特效 */
        .source-hidden { opacity: 0 !important; }
        .dragging { 
            opacity: 0.8 !important; transform: scale(1.1) !important;
            position: fixed !important; z-index: 9999 !important; 
            pointer-events: none !important; transition: none !important;
        }

        .pet-effect {
            position: absolute; pointer-events: none; z-index: 9999;
            font-size: 30px; animation: petFloat 0.8s ease-out forwards;
        }
        @keyframes petFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(2); opacity: 0; }
        }

        #dock { 
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            margin: 0 20px calc(var(--safe-bottom) + 15px) 20px; padding: 12px; 
            border-radius: 30px; display: flex; justify-content: space-around; flex-shrink: 0; 
        }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" style="text-decoration:none; font-size:26px;">💬</a>
    <a href="notes.html" style="text-decoration:none; font-size:26px;">📝</a>
    <a href="gallery.html" style="text-decoration:none; font-size:26px;">🖼️</a>
    <a href="clock.html" style="text-decoration:none; font-size:26px;">⏰</a>
    <div onclick="location.reload()" style="cursor:pointer; font-size:26px;">🏠</div>
</div>

<script>
    // --- 核心變數 ---
    let appData = [];
    const homeScreen = document.getElementById('home-screen');
    let dragTimeout, offsetX = 0, offsetY = 0, isReordering = false;

    // --- 主題與外觀應用 ---
    function applyTheme() {
        const colorA = localStorage.getItem('theme_color_a') || '#4285f4';
        const colorB = localStorage.getItem('theme_color_b') || '#1a2a6c';
        const wallpaper = localStorage.getItem('active_wallpaper');

        document.documentElement.style.setProperty('--color-a', colorA);
        document.documentElement.style.setProperty('--color-b', colorB);

        if (wallpaper) {
            document.body.style.backgroundImage = `url(${wallpaper})`;
            document.body.style.backgroundSize = 'cover';
        } else {
            document.body.style.backgroundImage = `linear-gradient(180deg, ${colorA}, ${colorB})`;
        }
    }

    // --- 取得 App 與 桌寵數據 ---
    function loadAppData() {
        const petConfig = JSON.parse(localStorage.getItem('desktop_pet')) || { enabled: false };
        const defaultApps = [
            { id: 'chat', name: 'MINE', icon: '💬', url: 'chat.html' },
            { id: 'clock', name: '時間', icon: '⏰', url: 'clock.html' },
            { id: 'weather', name: '天氣', icon: '☁️', url: 'weather.html' },
            { id: 'gallery', name: '相簿', icon: '🖼️', url: 'gallery.html' },
            { id: 'notes', name: '備忘錄', icon: '📝', url: 'notes.html' },
            { id: 'settings', name: '主題', icon: '🎨', url: 'settings.html' },
            { id: 'mail', name: '信箱', icon: '✉️', url: 'mail.html' },
            { id: 'pet_settings', name: '桌寵設定', icon: '🐾', url: 'pet_settings.html' }
        ];

        // 插入桌寵組件
        if (petConfig.enabled) {
            defaultApps.push({ id: 'desktop_pet_widget', name: '桌寵', isPet: true });
        }

        let savedLayout = localStorage.getItem('desktop_layout_ordered');
        if (savedLayout) {
            let parsed = JSON.parse(savedLayout);
            // 過濾並同步最新的 App 資訊
            let filtered = parsed.filter(p => defaultApps.some(d => d.id === p.id));
            defaultApps.forEach(d => {
                if (!filtered.some(f => f.id === d.id)) filtered.push(d);
            });
            appData = filtered;
        } else {
            appData = defaultApps;
        }
    }

    // --- 初始化桌面 ---
    function initDesktop() {
        homeScreen.innerHTML = '';
        appData.forEach((app, index) => {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = index;
            
            const el = app.isPet ? createPetElement() : createAppElement(app);
            slot.appendChild(el);
            homeScreen.appendChild(slot);
        });

        // 填充空白格子
        for (let i = homeScreen.children.length; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box">${app.icon}</div><span style="font-size:10px; margin-top:2px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function createPetElement() {
        const config = JSON.parse(localStorage.getItem('desktop_pet')) || {};
        const div = document.createElement('div');
        div.className = 'pet-widget';
        div.dataset.id = 'desktop_pet_widget';
        
        const img = document.createElement('img');
        img.src = config.idleImg || 'https://via.placeholder.com/120?text=PET';
        div.appendChild(img);

        // 點擊特效
        div.addEventListener('click', (e) => {
            if (window._isDraggingAction) return;
            img.src = config.activeImg || config.idleImg;
            spawnPetEffect(e.clientX, e.clientY, config.effectText);
            setTimeout(() => { img.src = config.idleImg; }, 1000);
        });

        setupDragging(div, config);
        return div;
    }

    function spawnPetEffect(x, y, text) {
        const span = document.createElement('span');
        span.className = 'pet-effect';
        span.innerText = text || '❤️';
        span.style.left = x + 'px'; span.style.top = y + 'px';
        document.body.appendChild(span);
        setTimeout(() => span.remove(), 800);
    }

    // --- 拖移邏輯 ---
    function setupDragging(el, petConfig = null) {
        let isDragging = false;
        let lastTargetIdx = -1;

        el.addEventListener('touchstart', (e) => {
            window._isDraggingAction = false;
            const touch = e.touches[0];
            const rect = el.getBoundingClientRect();
            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;

            dragTimeout = setTimeout(() => {
                isDragging = true;
                window._isDraggingAction = true;
                const clone = el.cloneNode(true);
                clone.classList.add('dragging');
                
                if (petConfig && clone.querySelector('img')) {
                    clone.querySelector('img').src = petConfig.dragImg || petConfig.idleImg;
                }

                clone.style.width = rect.width + 'px';
                clone.style.height = rect.height + 'px';
                clone.style.left = (touch.clientX - offsetX) + 'px';
                clone.style.top = (touch.clientY - offsetY) + 'px';
                
                document.body.appendChild(clone);
                window._activeClone = clone;
                el.classList.add('source-hidden');
                lastTargetIdx = appData.findIndex(a => a.id === el.dataset.id);
            }, 600);
        }, {passive: true});

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) return clearTimeout(dragTimeout);
            e.preventDefault();
            const touch = e.touches[0];
            
            if(window._activeClone) {
                window._activeClone.style.left = (touch.clientX - offsetX) + 'px';
                window._activeClone.style.top = (touch.clientY - offsetY) + 'px';
            }

            if (isReordering) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.grid-slot');
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== -1 && targetIdx !== lastTargetIdx && targetIdx < appData.length) {
                    lastTargetIdx = targetIdx;
                    isReordering = true;
                    realTimeReflow(el.dataset.id, targetIdx);
                    setTimeout(() => { isReordering = false; }, 150); 
                }
            }
        }, {passive: false});

        el.addEventListener('touchend', () => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            if(window._activeClone) window._activeClone.remove();
            el.classList.remove('source-hidden');
            localStorage.setItem('desktop_layout_ordered', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    function realTimeReflow(movingId, targetIdx) {
        const allIcons = document.querySelectorAll('.app-icon, .pet-widget');
        const firstPos = {};
        
        allIcons.forEach(icon => {
            if(icon.classList.contains('dragging')) return;
            const rect = icon.getBoundingClientRect();
            firstPos[icon.dataset.id] = { x: rect.left, y: rect.top };
        });

        const movingItem = appData.find(a => a.id === movingId);
        const oldIdx = appData.indexOf(movingItem);
        appData.splice(oldIdx, 1);
        appData.splice(targetIdx, 0, movingItem);

        const slots = document.querySelectorAll('.grid-slot');
        appData.forEach((app, index) => {
            const appEl = document.querySelector(`[data-id="${app.id}"]:not(.dragging)`);
            if (appEl && slots[index]) slots[index].appendChild(appEl);
        });

        // FLIP 動畫
        requestAnimationFrame(() => {
            allIcons.forEach(icon => {
                if(icon.classList.contains('dragging')) return;
                const id = icon.dataset.id;
                const rect = icon.getBoundingClientRect();
                const dx = (firstPos[id]?.x || rect.left) - rect.left;
                const dy = (firstPos[id]?.y || rect.top) - rect.top;
                
                if (dx !== 0 || dy !== 0) {
                    icon.style.transition = 'none';
                    icon.style.transform = `translate(${dx}px, ${dy}px)`;
                    icon.offsetWidth; 
                    icon.style.transition = 'transform 0.4s cubic-bezier(0.2, 1, 0.2, 1)';
                    icon.style.transform = 'translate(0, 0)';
                }
            });
        });
    }

    // --- 時間與系統監聽 ---
    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.addEventListener('storage', (e) => {
        if (['theme_color_a', 'active_wallpaper', 'desktop_pet'].includes(e.key)) {
            applyTheme(); loadAppData(); initDesktop();
        }
    });

    window.onfocus = () => { applyTheme(); loadAppData(); initDesktop(); };
    window.onload = () => { 
        applyTheme();
        loadAppData();
        initDesktop();
        updateTime();
        setInterval(updateTime, 1000);
    };
</script>
</body>
</html>
