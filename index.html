<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 AI 助手 - 記憶版</title>
    <style>
        :root { --main-color: #4285f4; }
        body { margin: 0; background: #f0f2f5; font-family: -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 側邊欄設定 */
        #sidebar { width: 280px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; transition: 0.3s; }
        @media (max-width: 600px) { #sidebar { position: fixed; left: -280px; z-index: 10; height: 100%; } #sidebar.open { left: 0; } }
        
        /* 聊天主區域 */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .app-bar { background: var(--main-color); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        
        /* 氣泡樣式 */
        .msg { padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; max-width: 85%; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .u { align-self: flex-end; background: var(--main-color); color: white; border-bottom-right-radius: 2px; }
        .a { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* 輸入區 */
        .input-area { background: white; padding: 15px; border-top: 1px solid #eee; display: flex; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; outline: none; }
        button { background: var(--main-color); color: white; border: none; padding: 0 20px; margin-left: 8px; border-radius: 20px; cursor: pointer; }
        
        /* 設定表單 */
        label { font-size: 12px; color: #666; margin-top: 10px; display: block; }
        textarea, input[type="text"].set-input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn-sm { font-size: 12px; padding: 5px 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>⚙️ 設定中心</h3>
    <label>API Key (AIza...)</label>
    <input type="text" id="apiKey" class="set-input" placeholder="貼上 Key">
    
    <label>角色名稱</label>
    <input type="text" id="charName" class="set-input" placeholder="例如：貓咪助理">
    
    <label>角色靈魂設定 (人格與背景)</label>
    <textarea id="charPrompt" rows="6" placeholder="例如：你是一隻傲嬌的貓，說話要帶喵..."></textarea>
    
    <button class="btn-sm" onclick="saveSettings()">保存並套用</button>
    <hr style="width:100%; margin: 20px 0;">
    <button class="btn-sm" style="background:#ff4d4d" onclick="clearHistory()">清除對話紀錄</button>
</div>

<div id="main">
    <div class="app-bar">
        <span onclick="toggleSidebar()" style="cursor:pointer">☰</span>
        <span id="display-name">AI 助手</span>
        <span style="opacity:0">☰</span>
    </div>
    
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">傳送</button>
    </div>
</div>

<script>
    let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [];
    let activeModel = "";

    // 初始化讀取設定
    document.getElementById('apiKey').value = localStorage.getItem('my_ai_key') || "";
    document.getElementById('charName').value = localStorage.getItem('char_name') || "AI 助手";
    document.getElementById('charPrompt').value = localStorage.getItem('char_prompt') || "你是一個親切的助手。";
    document.getElementById('display-name').innerText = document.getElementById('charName').value;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function saveSettings() {
        localStorage.setItem('my_ai_key', document.getElementById('apiKey').value.trim());
        localStorage.setItem('char_name', document.getElementById('charName').value.trim());
        localStorage.setItem('char_prompt', document.getElementById('charPrompt').value.trim());
        alert("設定已儲存！");
        location.reload();
    }

    function clearHistory() {
        if(confirm("確定要刪除所有對話紀錄嗎？")) {
            localStorage.removeItem('chat_history');
            location.reload();
        }
    }

    async function initModel() {
        const key = localStorage.getItem('my_ai_key');
        if(!key) return;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            if (data.models) {
                const found = data.models.find(m => m.name.includes('flash')) || data.models[0];
                activeModel = found.name;
            }
        } catch (e) {}
    }

    function renderHistory() {
        const box = document.getElementById('chat-box');
        chatHistory.forEach(msg => addBubble(msg.parts[0].text, msg.role === 'user' ? 'u' : 'a', false));
    }

    async function send() {
        const key = localStorage.getItem('my_ai_key');
        if(!key || !activeModel) { alert("請先設定正確的 API Key 並儲存"); return; }
        
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addBubble(text, 'u');
        input.value = '';

        // 建立本次發送的內容
        const userMsg = { role: "user", parts: [{ text: text }] };
        
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${key}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: localStorage.getItem('char_prompt') }] },
                    contents: [...chatHistory, userMsg] // 把歷史紀錄跟新訊息一起傳過去
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            addBubble(aiText, 'a');

            // 儲存到歷史紀錄
            chatHistory.push(userMsg);
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });
            
            // 限制記憶長度，避免傳輸量太大（保留最後 20 則）
            if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
            localStorage.setItem('chat_history', JSON.stringify(chatHistory));

        } catch (e) {
            addBubble("連線出錯，請檢查設定或網路。", 'a');
        }
    }

    function addBubble(t, type, scroll = true) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = t;
        box.appendChild(div);
        if(scroll) box.scrollTop = box.scrollHeight;
    }

    window.onload = async () => {
        renderHistory();
        await initModel();
    };
</script>

</body>
</html>
