<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>MINE Personal OS</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            /* 💡 讓重新整理生效，但禁止手指亂滑導致的位移 */
            overflow-y: auto; overflow-x: hidden;
            background: #1a2a6c;
        }

        body { 
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column;
            background-image: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d); 
            background-size: cover; background-position: center;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        /* 💡 恢復半透明底的狀態欄 */
        #status-bar {
            padding: calc(var(--safe-top) + 5px) 20px 10px 20px;
            display: flex; justify-content: space-between; font-size: 14px;
            background: rgba(0, 0, 0, 0.25); /* 這裡加回半透明底 */
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        #home-screen {
            flex: 1; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(6, 1fr); 
            gap: 10px; padding: 15px 20px;
            box-sizing: border-box;
            min-height: 80vh; /* 確保內容足夠長以觸發下拉刷新 */
        }

        .grid-slot {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .app-icon {
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: white; width: 70px;
            touch-action: none;
            transition: transform 0.35s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.2s;
            will-change: transform;
        }

        .source-hidden { opacity: 0 !important; pointer-events: none; }
        
        .icon-box {
            width: 60px; height: 60px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .dragging {
            opacity: 0.9; transform: scale(1.1) !important;
            position: fixed !important; z-index: 9999;
            pointer-events: none; transition: none !important;
        }

        #dock {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            margin: 10px 20px calc(var(--safe-bottom) + 15px) 20px;
            padding: 12px; border-radius: 30px;
            display: flex; justify-content: space-around;
        }
        .dock-item { text-decoration: none; font-size: 26px; }
    </style>
</head>
<body onscroll="handleScroll(event)">

<div id="status-bar">
    <span id="live-time">00:00</span>
    <span>📶 🔋 100%</span>
</div>

<div id="home-screen"></div>

<div id="dock">
    <a href="chat.html" class="dock-item">💬</a>
    <a href="notes.html" class="dock-item">📝</a>
    <a href="gallery.html" class="dock-item">🖼️</a>
    <a href="clock.html" class="dock-item">⏰</a>
    <div onclick="location.reload()" class="dock-item">🏠</div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('desktop_layout')) || [
        { id: 'chat', name: 'AI 助手', icon: '💬', color: '#4285f4', url: 'chat.html', slot: 0 },
        { id: 'clock', name: '時鐘', icon: '⏰', color: '#ff9800', url: 'clock.html', slot: 1 },
        { id: 'weather', name: '氣象', icon: '☁️', color: '#00bcd4', url: 'weather.html', slot: 2 },
        { id: 'gallery', name: '相簿', icon: '🖼️', color: '#e91e63', url: 'gallery.html', slot: 3 },
        { id: 'notes', name: '備忘錄', icon: '📝', color: '#4caf50', url: 'notes.html', slot: 4 },
        { id: 'archive', name: '記憶倉庫', icon: '🏛️', color: '#673ab7', url: 'archive.html', slot: 5 },
        { id: 'mail', name: '信箱', icon: '✉️', color: '#d44638', url: 'mail.html', slot: 6 }
    ];

    const homeScreen = document.getElementById('home-screen');
    let dragTimeout;
    let isReordering = false;

    // 💡 禁止非必要的滑動（鎖定畫面，但保留下拉刷新）
    function handleScroll(e) {
        if (window.scrollY < 0) return; // 允許下拉刷新
        if (window.scrollY > 0) window.scrollTo(0, 0); // 鎖定不准往上捲
    }

    function loadWallpaper() {
        const savedWallpaper = localStorage.getItem('active_wallpaper');
        if(savedWallpaper) document.body.style.backgroundImage = `url(${savedWallpaper})`;
    }

    function initDesktop() {
        homeScreen.innerHTML = '';
        for (let i = 0; i < 24; i++) {
            const slot = document.createElement('div');
            slot.className = 'grid-slot';
            slot.dataset.index = i;
            const app = appData.find(a => a.slot === i);
            if (app) slot.appendChild(createAppElement(app));
            homeScreen.appendChild(slot);
        }
    }

    function createAppElement(app) {
        const a = document.createElement('a');
        a.href = app.url; a.className = 'app-icon'; a.dataset.id = app.id;
        a.innerHTML = `<div class="icon-box" style="background:${app.color};">${app.icon}</div><span style="font-size:12px;">${app.name}</span>`;
        setupDragging(a);
        return a;
    }

    function setupDragging(el) {
        let isDragging = false;
        let lastTargetIdx = -1;

        el.addEventListener('touchstart', (e) => {
            if (window.scrollY > 5) return;
            dragTimeout = setTimeout(() => {
                isDragging = true;
                if (navigator.vibrate) navigator.vibrate(40);
                el.classList.add('source-hidden');
                const clone = el.cloneNode(true);
                clone.classList.remove('source-hidden');
                clone.classList.add('dragging');
                document.body.appendChild(clone);
                window._activeClone = clone;
                updateClonePos(e.touches[0].clientX, e.touches[0].clientY);
            }, 500);
        }, {passive: true});

        el.addEventListener('touchmove', (e) => {
            if (!isDragging) return clearTimeout(dragTimeout);
            if (e.cancelable) e.preventDefault();
            const touch = e.touches[0];
            updateClonePos(touch.clientX, touch.clientY);

            if (isReordering) return;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            const slot = target?.closest('.grid-slot');
            
            if (slot) {
                const targetIdx = parseInt(slot.dataset.index);
                if (targetIdx !== lastTargetIdx) {
                    lastTargetIdx = targetIdx;
                    isReordering = true;
                    realTimeSwap(el.dataset.id, targetIdx); // 💡 使用「即時交換」邏輯
                    setTimeout(() => { isReordering = false; }, 100); 
                }
            }
        }, {passive: false});

        el.addEventListener('touchend', () => {
            clearTimeout(dragTimeout);
            if (!isDragging) return;
            isDragging = false;
            if(window._activeClone) window._activeClone.remove();
            localStorage.setItem('desktop_layout', JSON.stringify(appData));
            initDesktop(); 
        });
    }

    function updateClonePos(x, y) {
        if(window._activeClone) {
            window._activeClone.style.left = x - 35 + 'px';
            window._activeClone.style.top = y - 35 + 'px';
        }
    }

    // 💡 自由位移中的「流動閃避」：路過就交換，不影響其他 App 的座標
    function realTimeSwap(movingId, targetIdx) {
        const movingApp = appData.find(a => a.id === movingId);
        const existingApp = appData.find(a => a.slot === targetIdx);
        
        if (existingApp && existingApp.id !== movingId) {
            // FLIP 動畫記錄
            const targetEl = document.querySelector(`.app-icon[data-id="${existingApp.id}"]`);
            const rect = targetEl.getBoundingClientRect();
            
            // 交換座標
            const oldSlot = movingApp.slot;
            existingApp.slot = oldSlot;
            movingApp.slot = targetIdx;

            // 執行平移動畫
            const slots = document.querySelectorAll('.grid-slot');
            slots[oldSlot].appendChild(targetEl);
            
            const newRect = targetEl.getBoundingClientRect();
            const deltaX = rect.left - newRect.left;
            const deltaY = rect.top - newRect.top;

            targetEl.style.transition = 'none';
            targetEl.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            targetEl.offsetWidth; 
            targetEl.style.transition = 'transform 0.4s cubic-bezier(0.19, 1, 0.22, 1)';
            targetEl.style.transform = 'translate(0, 0)';
        } else {
            // 純移動到空位
            movingApp.slot = targetIdx;
        }
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('live-time').innerText = 
            now.getHours().toString().padStart(2, '0') + ":" + 
            now.getMinutes().toString().padStart(2, '0');
    }

    window.onload = () => {
        updateTime(); loadWallpaper(); initDesktop();
        setInterval(updateTime, 1000);
    };
    document.addEventListener('selectstart', (e) => e.preventDefault());
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
