<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>模擬信箱</title>
    <style>
        /* 預設為信箱經典紅，會被 JS 動態覆蓋 */
        :root { --primary: #d44638; --bg: #f5f5f5; --text-on-primary: #ffffff; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
        }
        
        .app-bar { 
            padding: calc(env(safe-area-inset-top) + 15px) 15px 15px; 
            background: var(--primary); 
            color: var(--text-on-primary); 
            display: flex; align-items: center; justify-content: space-between; 
            z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .back-btn { color: var(--text-on-primary); text-decoration: none; font-size: 17px; font-weight: 500; }

        .mail-list { flex: 1; overflow-y: auto; padding: 12px; }
        .mail-item { 
            background: white; padding: 16px; border-radius: 16px; margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03); cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s; position: relative;
            border-left: 4px solid var(--primary); /* 側邊裝飾色 */
        }
        .mail-item:active { transform: scale(0.97); }
        
        .delete-btn {
            position: absolute; top: 12px; right: 12px;
            background: #f0f0f0; color: #999; border: none;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; z-index: 5;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #ff4444; color: white; }

        .mail-sender { font-weight: bold; color: #111; font-size: 16px; padding-right: 35px; }
        .mail-subject { font-size: 14px; color: #555; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-time { font-size: 11px; color: #aaa; margin-top: 10px; }

        .compose-btn { 
            position: fixed; bottom: 30px; right: 20px; 
            background: var(--primary); color: var(--text-on-primary); border: none;
            width: 60px; height: 60px; border-radius: 30px; font-size: 28px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .compose-btn:active { transform: scale(0.9); }

        /* 閱讀器樣式優化 */
        #reader-overlay {
            display: none; position: fixed; inset: 0; background: white; z-index: 100;
            flex-direction: column; padding: 25px;
            animation: slideUp 0.3s ease-out;
        }
        .reader-header { border-bottom: 2px solid var(--bg); padding-bottom: 20px; margin-bottom: 20px; }
        .reader-content { flex: 1; line-height: 1.8; color: #333; white-space: pre-wrap; overflow-y: auto; font-size: 16px; }
        .close-reader { 
            background: var(--primary); color: var(--text-on-primary); 
            border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 15px;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html" class="back-btn">❮ 桌面</a>
    <span style="font-weight: bold;">我的信箱</span>
    <span onclick="clearAll()" style="font-size:12px; opacity:0.8; cursor:pointer;">清空匣</span>
</div>

<div class="mail-list" id="mailBox"></div>

<div id="reader-overlay">
    <div class="reader-header">
        <h2 id="read-subject" style="margin:0 0 12px 0; color:#000;"></h2>
        <div id="read-sender" style="color:#666; font-size:13px; background:#f9f9f9; padding:8px; border-radius:8px;"></div>
    </div>
    <div class="reader-content" id="read-content"></div>
    <button class="close-reader" onclick="closeReader()">返回收件匣</button>
</div>

<button class="compose-btn" id="composeBtn" onclick="openCompose()">✎</button>

<script>
    let emails = JSON.parse(localStorage.getItem('my_emails') || "[]");

    // ✨ 注入獨立選色邏輯
    function applyTheme() {
        const emailColor = localStorage.getItem('app_email_color_a') || '#d44638';
        document.documentElement.style.setProperty('--primary', emailColor);
        
        // 智慧計算文字顏色 (深色背景用白字，淺色背景用黑字)
        const r = parseInt(emailColor.slice(1,3), 16);
        const g = parseInt(emailColor.slice(3,5), 16);
        const b = parseInt(emailColor.slice(5,7), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        const textColor = brightness > 180 ? '#333333' : '#ffffff';
        document.documentElement.style.setProperty('--text-on-primary', textColor);
    }

    function renderEmails() {
        const box = document.getElementById('mailBox');
        if(emails.length === 0) {
            box.innerHTML = `
                <div style="text-align:center; color:#ccc; margin-top:100px;">
                    <div style="font-size:60px; margin-bottom:15px;">📥</div>
                    <p style="font-size:14px;">收件匣空空如也喵～</p>
                </div>`;
            return;
        }
        
        box.innerHTML = emails.map((mail, index) => `
            <div class="mail-item" onclick="readMail(${index})">
                <button class="delete-btn" onclick="event.stopPropagation(); deleteMail(${index})">✕</button>
                <div class="mail-sender">${mail.sender}</div>
                <div class="mail-subject">${mail.subject}</div>
                <div class="mail-time">${mail.time}</div>
            </div>
        `).join('');
    }

    function deleteMail(index) {
        if(confirm("確定要刪除這封信件嗎？")) {
            emails.splice(index, 1);
            saveAndRender();
        }
    }

    function openCompose() {
        const sender = prompt("寄信人：", "未來的自己");
        const subject = prompt("主旨：");
        const content = prompt("信件內容：");
        
        if(sender && subject && content) {
            const newMail = {
                sender, subject, content, 
                time: new Date().toLocaleString()
            };
            emails.unshift(newMail);
            saveAndRender();
        }
    }

    function readMail(index) {
        const mail = emails[index];
        document.getElementById('read-subject').innerText = mail.subject;
        document.getElementById('read-sender').innerText = `From: ${mail.sender}\nDate: ${mail.time}`;
        document.getElementById('read-content').innerText = mail.content;
        document.getElementById('reader-overlay').style.display = 'flex';
    }

    function closeReader() {
        document.getElementById('reader-overlay').style.display = 'none';
    }

    function clearAll() {
        if(confirm("真的要清空所有郵件嗎喵？此動作無法復原喔！")) {
            emails = [];
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('my_emails', JSON.stringify(emails));
        renderEmails();
    }

    // 初始化載入
    applyTheme();
    renderEmails();
</script>
</body>
</html>
