<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C² 信箱</title>
    <style>
        :root { 
            --primary: #d44638; /* 預設紅色 */
            --bg: #f5f5f5; 
            --text-on-primary: #ffffff; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
        }

        .app-bar { 
            padding: calc(env(safe-area-inset-top) + 15px) 15px 15px; 
            background: var(--primary); 
            color: var(--text-on-primary); 
            display: flex; align-items: center; justify-content: space-between; 
            z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: background 0.3s, color 0.3s;
        }
        .back-btn { color: inherit; text-decoration: none; font-size: 17px; font-weight: 500; }

        .mail-list { flex: 1; overflow-y: auto; padding: 12px; }
        .mail-item { 
            background: white; padding: 16px; border-radius: 16px; margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03); cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s; position: relative;
            border-left: 4px solid var(--primary);
        }
        .mail-item:active { transform: scale(0.97); }

        .delete-btn {
            position: absolute; top: 12px; right: 12px;
            background: #f0f0f0; color: #999; border: none;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; z-index: 5;
        }

        .mail-sender { font-weight: bold; color: #111; font-size: 16px; padding-right: 35px; }
        .mail-subject { font-size: 14px; color: #555; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-time { font-size: 11px; color: #aaa; margin-top: 10px; }

        .compose-btn { 
            position: fixed; bottom: 30px; right: 20px; 
            background: var(--primary); color: var(--text-on-primary); border: none;
            width: 60px; height: 60px; border-radius: 30px; font-size: 28px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.3s, color 0.3s; z-index: 50;
        }

        #reader-overlay, #compose-overlay {
            display: none; position: fixed; inset: 0; background: white; z-index: 100;
            flex-direction: column; padding: 25px calc(env(safe-area-inset-right) + 20px) 25px calc(env(safe-area-inset-left) + 20px);
            animation: slideUp 0.3s ease-out;
        }
        .overlay-header { border-bottom: 2px solid var(--bg); padding-bottom: 20px; margin-bottom: 20px; }
        .content-area { flex: 1; line-height: 1.8; color: #333; white-space: pre-wrap; overflow-y: auto; font-size: 16px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; }
        .form-group input, .form-group textarea { 
            width: 100%; border: none; background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 15px; outline: none;
        }
        .form-group textarea { height: 200px; resize: none; }

        .action-btn { 
            background: var(--primary); color: var(--text-on-primary); 
            border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        #customModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.4); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background:white; width:85%; max-width:320px; border-radius:28px; 
            overflow:hidden; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-header { padding:18px; text-align:center; color:var(--text-on-primary); background: var(--primary); font-weight:bold; font-size: 16px; transition: background 0.3s, color 0.3s; }
        .modal-body { padding:25px 20px; text-align:center; color:#444; font-size:15px; line-height:1.5; }
        .modal-footer { display:flex; border-top:1px solid #eee; }
        .modal-btn { flex:1; padding:16px; border:none; background:white; color:var(--primary); font-weight:bold; font-size:16px; cursor:pointer; transition: color 0.3s; }
        .modal-btn:last-child { border-left: 1px solid #eee; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-bar" id="appBar">
    <a href="index.html" class="back-btn">❮ 桌面</a>
    <span style="font-weight: bold;">我的信箱</span>
    <span onclick="confirmClearAll()" style="font-size:12px; opacity:0.8; cursor:pointer;">清空匣</span>
</div>

<div class="mail-list" id="mailBox"></div>

<!-- 閱讀器 -->
<div id="reader-overlay">
    <div class="overlay-header">
        <h2 id="read-subject" style="margin:0 0 12px 0; color:#000;"></h2>
        <div id="read-sender" style="color:#666; font-size:13px; background:#f9f9f9; padding:8px; border-radius:8px; white-space:pre-line;"></div>
    </div>
    <div class="content-area" id="read-content"></div>
    <button class="action-btn" onclick="closeOverlay('reader-overlay')">返回收件匣</button>
</div>

<!-- 寫信介面 -->
<div id="compose-overlay">
    <div class="overlay-header">
        <h2 style="margin:0; color:#000;">撰寫郵件</h2>
    </div>
    <div class="content-area">
        <div class="form-group">
            <label>寄件人</label>
            <input type="text" id="comp-sender" value="未來的自己">
        </div>
        <div class="form-group">
            <label>主旨</label>
            <input type="text" id="comp-subject" placeholder="請輸入主旨">
        </div>
        <div class="form-group">
            <label>內容</label>
            <textarea id="comp-content" placeholder="寫點什麼給未來的自己..."></textarea>
        </div>
    </div>
    <div style="display:flex; gap:10px; padding: 20px 0;">
        <button class="action-btn" style="flex:1; background:#eee; color:#666;" onclick="closeOverlay('compose-overlay')">取消</button>
        <button class="action-btn" style="flex:2;" onclick="sendMail()">寄出郵件</button>
    </div>
</div>

<button class="compose-btn" id="composeBtn" onclick="openCompose()">✎</button>

<div id="customModal">
    <div class="modal-content">
        <div id="modalHeader" class="modal-header">通知</div>
        <div id="modalBody" class="modal-body">內容文字</div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
    let emails = JSON.parse(localStorage.getItem('my_emails') || "[]");

    // ✨ 終極主題同步邏輯：確保即時性與兼容性
    function applyTheme() {
        // 從 localStorage 獲取顏色來源
        const appColor = localStorage.getItem('app_mail_color_a'); 
        const systemColor = localStorage.getItem('theme_color_a');
        const defaultRed = '#d44638';

        // 優先順序：App 獨立選色 > 系統主色 > 預設紅色
        let finalColor = appColor || systemColor || defaultRed;

        // 安全處理：確保顏色字串格式正確（補上 # 號）
        if (finalColor && !finalColor.startsWith('#')) {
            finalColor = '#' + finalColor;
        }

        // 強制寫入 CSS 變數
        const root = document.documentElement;
        root.style.setProperty('--primary', finalColor);

        // 智能亮度偵測：確保在「蘇打藍」等淺色主題下文字依然清晰
        try {
            const hex = finalColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;

            // 亮度大於 180 為亮色調，文字改用深灰；否則維持白色
            const textColor = brightness > 180 ? '#333333' : '#ffffff';
            root.style.setProperty('--text-on-primary', textColor);
            
            // 同步更新行動端狀態列顏色
            let metaTheme = document.querySelector('meta[name="theme-color"]');
            if (!metaTheme) {
                metaTheme = document.createElement('meta');
                metaTheme.name = "theme-color";
                document.head.appendChild(metaTheme);
            }
            metaTheme.content = finalColor;
        } catch (e) {
            root.style.setProperty('--text-on-primary', '#ffffff');
        }
    }

    // 當 localStorage 有變動時即時更新（防止跨頁面設定延遲）
    window.addEventListener('storage', (e) => {
        if (e.key === 'app_mail_color_a' || e.key === 'theme_color_a') {
            applyTheme();
        }
    });

    function showModal(title, msg, onConfirm = null) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalHeader').innerText = title;
        document.getElementById('modalBody').innerText = msg;
        const footer = document.getElementById('modalFooter');

        if (onConfirm) {
            footer.innerHTML = `
                <button class="modal-btn" style="color:#888" onclick="closeModal()">取消</button>
                <button class="modal-btn" id="confirmBtn">確定</button>
            `;
            document.getElementById('confirmBtn').onclick = () => { onConfirm(); closeModal(); };
        } else {
            footer.innerHTML = `<button class="modal-btn" onclick="closeModal()">確定</button>`;
        }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function renderEmails() {
        const box = document.getElementById('mailBox');
        if(emails.length === 0) {
            box.innerHTML = `<div style="text-align:center; color:#ccc; margin-top:100px;"><div style="font-size:60px; margin-bottom:15px;">📥</div><p>收件匣空空如也喵～</p></div>`;
            return;
        }
        box.innerHTML = emails.map((mail, index) => `
            <div class="mail-item" onclick="readMail(${index})">
                <button class="delete-btn" onclick="event.stopPropagation(); confirmDeleteMail(${index})">✕</button>
                <div class="mail-sender">${mail.sender}</div>
                <div class="mail-subject">${mail.subject}</div>
                <div class="mail-time">${mail.time}</div>
            </div>
        `).join('');
    }

    function confirmDeleteMail(index) {
        showModal("確認刪除", "確定要刪除這封信件嗎？", () => {
            emails.splice(index, 1);
            saveAndRender();
        });
    }

    function openCompose() {
        document.getElementById('compose-overlay').style.display = 'flex';
    }

    function sendMail() {
        const sender = document.getElementById('comp-sender').value.trim();
        const subject = document.getElementById('comp-subject').value.trim();
        const content = document.getElementById('comp-content').value.trim();

        if(!subject || !content) {
            showModal("提醒", "主旨和內容不能空空的喔！");
            return;
        }

        const newMail = { sender, subject, content, time: new Date().toLocaleString() };
        emails.unshift(newMail);
        saveAndRender();
        closeOverlay('compose-overlay');

        document.getElementById('comp-subject').value = "";
        document.getElementById('comp-content').value = "";
    }

    function readMail(index) {
        const mail = emails[index];
        document.getElementById('read-subject').innerText = mail.subject;
        document.getElementById('read-sender').innerText = `寄件人: ${mail.sender}\n日期: ${mail.time}`;
        document.getElementById('read-content').innerText = mail.content;
        document.getElementById('reader-overlay').style.display = 'flex';
    }

    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

    function confirmClearAll() {
        showModal("危險操作", "真的要清空所有郵件嗎？此動作無法復原喔！", () => {
            emails = [];
            saveAndRender();
        });
    }

    function saveAndRender() {
        localStorage.setItem('my_emails', JSON.stringify(emails));
        renderEmails();
    }

    // 初始化：確保頁面結構與數據準備就緒
    document.addEventListener('DOMContentLoaded', () => {
        applyTheme();
        renderEmails();
    });
</script>
</body>
</html>
