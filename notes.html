<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>備忘錄</title>
    <style>
        :root { --primary: #4caf50; --bg: #f9f9f9; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: white; border-bottom: 1px solid #ddd; }
        a { text-decoration: none; color: var(--primary); font-size: 16px; font-weight: bold; }
        
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .note-card { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .note-text { flex: 1; font-size: 16px; color: #333; }
        .del-btn { color: #ff5252; border: none; background: none; font-size: 18px; cursor: pointer; margin-left: 10px; }
        
        .input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html">❮ 桌面</a>
    <h3 style="margin:0">備忘錄</h3>
    <span style="width:40px"></span>
</div>

<div class="content" id="notes-list">
    </div>

<div class="input-area">
    <input type="text" id="noteInput" placeholder="輸入記事 (例如：我喜歡藍色)">
    <button class="add-btn" onclick="addNote()">新增</button>
</div>

<script>
    let notes = JSON.parse(localStorage.getItem('user_notes')) || [];

    function renderNotes() {
        const list = document.getElementById('notes-list');
        list.innerHTML = "";
        notes.forEach((text, index) => {
            list.innerHTML += `
                <div class="note-card">
                    <div class="note-text">${text}</div>
                    <button class="del-btn" onclick="deleteNote(${index})">🗑️</button>
                </div>
            `;
        });
    }

    function addNote() {
        const input = document.getElementById('noteInput');
        if (input.value.trim() === "") return;
        notes.push(input.value.trim());
        saveAndRender();
        input.value = "";
    }

    function deleteNote(index) {
        notes.splice(index, 1);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('user_notes', JSON.stringify(notes));
        renderNotes();
    }

    renderNotes();
</script>
</body>
</html>
