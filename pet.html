<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>桌寵設定中心</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --safe-bottom: env(safe-area-inset-bottom);
            --color-a: #4285f4; 
            --color-b: #1a2a6c; 
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a2a6c; }

        body { 
            color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column;
            background-color: var(--color-a);
            background-image: linear-gradient(180deg, var(--color-a), var(--color-b));
            background-size: cover; background-position: center;
            /* 💡 核心修正：設定頁面也全面禁用長按選單與文字反白 */
            -webkit-touch-callout: none !important; 
            -webkit-user-select: none !important; 
            user-select: none !important;
            position: relative; 
            overscroll-behavior-y: contain; 
            overflow-x: hidden;
            overflow-y: auto;
        }

        #header {
            padding: calc(var(--safe-top) + 15px) 20px 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; position: sticky; top: 0;
        }

        .back-btn { text-decoration: none; color: white; font-size: 18px; font-weight: bold; }
        .title { font-size: 18px; font-weight: bold; }

        .container { padding: 20px; box-sizing: border-box; flex: 1; }

        .setting-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .setting-row:last-child { margin-bottom: 0; }
        .label-text { font-size: 16px; font-weight: 500; }

        /* Switch 開關 */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.3); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #4cd964; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* 💡 核心修正：自訂外觀文字移出框格後的外部標籤樣式 */
        .input-label { display: block; font-size: 14px; margin-bottom: 6px; color: rgba(255, 255, 255, 0.85); font-weight: 500; }

        /* 輸入框樣式 */
        .input-box {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0, 0, 0, 0.2); color: white; font-size: 14px; box-sizing: border-box; margin-bottom: 15px;
            -webkit-user-select: text !important; user-select: text !important; /* 確保輸入框可以正常點擊輸入文字 */
        }
        .input-box:last-child { margin-bottom: 0; }
        .input-box::placeholder { color: rgba(255,255,255,0.4); }

        /* 滑桿樣式 */
        .range-slider { width: 65%; -webkit-appearance: none; background: rgba(255,255,255,0.3); height: 6px; border-radius: 5px; outline: none; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: white; cursor: pointer; }

        /* 儲存按鈕 */
        .save-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: #4cd964; color: white; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s;
        }
        .save-btn:active { transform: scale(0.98); }

        /* 預覽區域 */
        .preview-area { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
        .preview-pet-box {
            width: 120px; height: 120px; display: flex; justify-content: center; align-items: center;
            border: 2px dashed rgba(255,255,255,0.3); border-radius: 20px; margin-top: 10px; position: relative;
        }
        /* 💡 核心修正：預覽圖片也阻斷長按選單 */
        .preview-pet-box img { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
        }
        .preview-effect { position: absolute; font-size: 24px; animation: pFloat 0.8s ease-out forwards; pointer-events: none; }
        @keyframes pFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="header">
    <a href="index.html" class="back-btn">ㄑ 返回</a>
    <div class="title">🐾 桌寵設定中心</div>
    <div style="width: 40px;"></div>
</div>

<div class="container">
    <!-- 基本開關 -->
    <div class="setting-card">
        <div class="setting-row">
            <span class="label-text">啟用桌面精靈</span>
            <label class="switch">
                <input type="checkbox" id="pet-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="setting-row" style="margin-top: 20px;">
            <span class="label-text">桌寵大小</span>
            <input type="range" id="pet-size" class="range-slider" min="60" max="200" value="110">
            <span id="size-val" style="font-size: 14px; width: 40px; text-align: right;">110px</span>
        </div>
    </div>

    <!-- 💡 核心修正：將引導文字移到框格外面，框格內改用乾淨的 placeholder -->
    <div class="setting-card">
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">🎨 自訂外觀與動作</div>
        
        <label class="input-label">靜態 / 閒置圖網址：</label>
        <input type="text" id="img-idle" class="input-box" placeholder="請輸入圖片網址 (預設為預留圖)">
        
        <label class="input-label">點擊互動圖網址：</label>
        <input type="text" id="img-active" class="input-box" placeholder="請輸入點擊時顯示的圖片網址">
        
        <label class="input-label">按住拖曳圖網址：</label>
        <input type="text" id="img-drag" class="input-box" placeholder="請輸入拖曳時顯示的圖片網址">
        
        <label class="input-label">點擊彈出文字 / 特效：</label>
        <input type="text" id="effect-text" class="input-box" placeholder="例如：❤️ 或 喵~ (預設為 ❤️)">
    </div>

    <!-- 儲存 -->
    <button class="save-btn" onclick="savePetConfig()">儲存並應用設定</button>

    <!-- 即時預覽 -->
    <div class="setting-card preview-area">
        <div style="font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 5px;">✨ 點擊下方區塊可測試點擊動效</div>
        <div class="preview-pet-box" id="preview-box">
            <img id="preview-img" src="" alt="寵物預覽">
        </div>
    </div>
</div>

<script>
    // 套用主題顏色
    function applyTheme() {
        const colorA = localStorage.getItem('theme_color_a') || '#4285f4';
        const colorB = localStorage.getItem('theme_color_b') || '#1a2a6c';
        const wallpaper = localStorage.getItem('active_wallpaper');
        document.documentElement.style.setProperty('--color-a', colorA);
        document.documentElement.style.setProperty('--color-b', colorB);
        if (wallpaper) {
            document.body.style.backgroundImage = `url(${wallpaper})`;
        } else {
            document.body.style.backgroundImage = `linear-gradient(180deg, ${colorA}, ${colorB})`;
        }
    }

    // 載入當前桌寵配置
    let currentConfig = {};
    const defaultImg = 'https://via.placeholder.com/100?text=PET';

    function loadPetConfig() {
        applyTheme();
        currentConfig = JSON.parse(localStorage.getItem('desktop_pet')) || {
            enabled: false,
            size: 110,
            idleImg: '',
            activeImg: '',
            dragImg: '',
            effectText: '❤️'
        };

        // 填入控制項
        document.getElementById('pet-toggle').checked = currentConfig.enabled;
        document.getElementById('pet-size').value = currentConfig.size || 110;
        document.getElementById('size-val').innerText = (currentConfig.size || 110) + 'px';
        document.getElementById('img-idle').value = currentConfig.idleImg || '';
        document.getElementById('img-active').value = currentConfig.activeImg || '';
        document.getElementById('img-drag').value = currentConfig.dragImg || '';
        document.getElementById('effect-text').value = currentConfig.effectText || '❤️';

        updatePreview();
    }

    // 更新預覽畫面
    function updatePreview() {
        const idleUrl = document.getElementById('img-idle').value;
        const pImg = document.getElementById('preview-img');
        pImg.src = idleUrl || defaultImg;
    }

    // 綁定滑桿與輸入即時連動
    document.getElementById('pet-size').addEventListener('input', (e) => {
        document.getElementById('size-val').innerText = e.target.value + 'px';
    });
    document.getElementById('img-idle').addEventListener('input', updatePreview);

    // 預覽區的點擊測試
    const pBox = document.getElementById('preview-box');
    const pImg = document.getElementById('preview-img');

    // 💡 修正：全面阻斷預覽區域的長按與右鍵選單
    pBox.addEventListener('contextmenu', (e) => e.preventDefault());
    pImg.addEventListener('contextmenu', (e) => e.preventDefault());

    function triggerPreviewActive() {
        const activeUrl = document.getElementById('img-active').value;
        const idleUrl = document.getElementById('img-idle').value;
        const effectTxt = document.getElementById('effect-text').value || '❤️';

        if (activeUrl) pImg.src = activeUrl;
        
        // 彈出特效
        const span = document.createElement('span');
        span.className = 'preview-effect';
        span.innerText = effectTxt;
        span.style.left = '45%';
        span.style.top = '40%';
        pBox.appendChild(span);
        
        setTimeout(() => span.remove(), 800);
        setTimeout(() => { pImg.src = idleUrl || defaultImg; }, 2000);
    }

    pBox.onclick = triggerPreviewActive;
    pBox.ontouchstart = (e) => {
        e.preventDefault(); // 阻斷觸控長按選單
        triggerPreviewActive();
    };

    // 儲存設定
    function savePetConfig() {
        const config = {
            enabled: document.getElementById('pet-toggle').checked,
            size: parseInt(document.getElementById('pet-size').value),
            idleImg: document.getElementById('img-idle').value,
            activeImg: document.getElementById('img-active').value,
            dragImg: document.getElementById('img-drag').value,
            effectText: document.getElementById('effect-text').value || '❤️'
        };

        localStorage.setItem('desktop_pet', JSON.stringify(config));
        // 發送跨頁面同步通知
        localStorage.setItem('pet_sync_trigger', Date.now());
        
        alert('設定儲存成功！已即時同步至主畫面。');
    }

    window.onload = loadPetConfig;
</script>
</body>
</html>
