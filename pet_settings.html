<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>桌寵設定</title>
    <style>
        :root {
            /* 預設顏色，會被 JS 動態覆蓋 */
            --theme-a: #4285f4;
            --theme-b: #1a2a6c;
            --accent-color: #ff4d4d; /* 桌寵獨立主題色 */
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, sans-serif;
            background: linear-gradient(180deg, var(--theme-a), var(--theme-b));
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-top: env(safe-area-inset-top);
        }

        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: white;
            margin-right: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h2 { margin-top: 0; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        .setting-item {
            margin-bottom: 15px;
        }

        label { display: block; font-size: 14px; opacity: 0.9; margin-bottom: 8px; }

        input[type="text"], input[type="color"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            box-sizing: border-box;
        }

        input[type="color"] {
            height: 45px;
            padding: 5px;
            cursor: pointer;
        }

        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--accent-color); /* 使用獨立主題色 */
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .save-btn:active { transform: scale(0.98); }

        .hint { font-size: 12px; opacity: 0.7; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <h1>桌寵設定</h1>
</div>

<div class="card">
    <div class="setting-item switch-container">
        <span>啟用桌寵掛件</span>
        <input type="checkbox" id="petEnabled" style="width:22px; height:22px;">
    </div>
</div>

<div class="card">
    <h2>🎨 個性化主題</h2>
    <div class="setting-item">
        <label>桌寵獨立主題色 (特效/按鈕)</label>
        <input type="color" id="accentColor">
        <div class="hint">這會影響點擊時的特效顏色與設定頁按鈕。</div>
    </div>
    <div class="setting-item">
        <label>點擊特效文字 (如: ❤️, ✨, 喵)</label>
        <input type="text" id="effectText" placeholder="輸入符號或文字">
    </div>
</div>

<div class="card">
    <h2>🖼️ 動作素材 (URL)</h2>
    <div class="setting-item">
        <label>靜置圖 (預設)</label>
        <input type="text" id="idleImg" placeholder="https://...">
    </div>
    <div class="setting-item">
        <label>點擊圖 (無則用靜置圖)</label>
        <input type="text" id="activeImg" placeholder="https://...">
    </div>
    <div class="setting-item">
        <label>移動圖 (無則依序遞補)</label>
        <input type="text" id="dragImg" placeholder="https://...">
    </div>
</div>

<button class="save-btn" onclick="saveSettings()">儲存並套用</button>

<script>
    // 載入時套用系統主題色
    function applySystemTheme() {
        const colorA = localStorage.getItem('theme_color_a') || '#4285f4';
        const colorB = localStorage.getItem('theme_color_b') || '#1a2a6c';
        document.documentElement.style.setProperty('--theme-a', colorA);
        document.documentElement.style.setProperty('--theme-b', colorB);
    }

    // 載入設定
    function loadSettings() {
        applySystemTheme();
        const config = JSON.parse(localStorage.getItem('desktop_pet')) || {
            enabled: false,
            idleImg: '',
            activeImg: '',
            dragImg: '',
            effectText: '❤️',
            accentColor: '#ff4d4d'
        };

        document.getElementById('petEnabled').checked = config.enabled;
        document.getElementById('idleImg').value = config.idleImg || '';
        document.getElementById('activeImg').value = config.activeImg || '';
        document.getElementById('dragImg').value = config.dragImg || '';
        document.getElementById('effectText').value = config.effectText || '❤️';
        document.getElementById('accentColor').value = config.accentColor || '#ff4d4d';
        
        // 套用獨立主題色到 CSS 變數
        document.documentElement.style.setProperty('--accent-color', config.accentColor);
    }

    // 儲存設定
    function saveSettings() {
        const config = {
            enabled: document.getElementById('petEnabled').checked,
            idleImg: document.getElementById('idleImg').value,
            activeImg: document.getElementById('activeImg').value,
            dragImg: document.getElementById('dragImg').value,
            effectText: document.getElementById('effectText').value,
            accentColor: document.getElementById('accentColor').value
        };

        localStorage.setItem('desktop_pet', JSON.stringify(config));
        
        // 發送同步訊號給首頁
        localStorage.setItem('pet_sync_trigger', Date.now());
        
        // 即時套用獨立色
        document.documentElement.style.setProperty('--accent-color', config.accentColor);
        
        alert('設定已儲存！');
    }

    window.onload = loadSettings;
</script>

</body>
</html>
