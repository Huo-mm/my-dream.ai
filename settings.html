<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>視覺自定義中心</title>
    <style>
        :root { --primary: #007aff; --bg: #f4f4f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); font-family: -apple-system, sans-serif;
            padding: calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 30px);
            color: #333;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: #333; }
        
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .card-title { font-size: 17px; font-weight: bold; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: #000; }
        
        .app-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 0; border-bottom: 1px solid #f2f2f2; 
        }
        .app-row:last-child { border-bottom: none; }
        .app-info { display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; transition: 0.3s; }
        
        .picker-wrapper { 
            position: relative; width: 44px; height: 44px; border-radius: 50%; 
            overflow: hidden; border: 3px solid #fff; box-shadow: 0 0 0 1px #ddd;
            transition: transform 0.2s;
        }
        .picker-wrapper:active { transform: scale(0.9); }
        input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 64px; height: 64px; border: none; cursor: pointer; background: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn {
            border: none; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.2s; background: #eee; color: #333; text-align: center;
        }
        .btn-primary { background: var(--primary); color: white; grid-column: span 2; padding: 16px; font-size: 15px; }
        .btn-danger { background: #fff1f0; color: #ff3b30; grid-column: span 2; margin-top: 10px; }

        #customModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.4); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background:white; width:85%; max-width:320px; border-radius:28px; 
            overflow:hidden; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        .modal-header { padding:18px; text-align:center; color:white; font-weight:bold; }
        .modal-body { padding:25px 20px; text-align:center; color:#444; font-size:15px; line-height:1.5; }
        .modal-footer { display:flex; border-top:1px solid #eee; }
        .modal-btn { flex:1; padding:16px; border:none; background:white; color:#007aff; font-weight:bold; font-size:16px; }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">❮</a>
    <h1 style="font-size: 22px; margin: 0;">視覺自定義中心</h1>
</div>

<div class="card">
    <div class="card-title">🌐 桌面圖示主題 (System)</div>
    <div style="display: flex; justify-content: space-around; align-items: center; background: #f9f9f9; padding: 20px; border-radius: 18px; margin-bottom: 15px;">
        <div style="text-align:center">
            <div class="picker-wrapper"><input type="color" id="sysColorA" oninput="saveLive('theme_color_a', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">圖示主色</div>
        </div>
        <div style="font-size:24px; color:#ddd;">➔</div>
        <div style="text-align:center">
            <div class="picker-wrapper"><input type="color" id="sysColorB" oninput="saveLive('theme_color_b', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">圖示漸層</div>
        </div>
    </div>
    <button class="btn btn-primary" id="syncBtn" onclick="syncAllToSystem()">一鍵同步全系統為圖示主色</button>
</div>

<div class="card">
    <div class="card-title">📱 獨立 APP 選色</div>
    
    <div class="app-row">
        <div class="app-info">
            <div id="iconAI" class="app-icon" style="background: #4285f4;">💬</div>
            <div><div style="font-size:14px; font-weight:600;">AI 助手</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorChat" oninput="saveLive('app_ai_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconClock" class="app-icon" style="background: #ff9800;">⏰</div>
            <div><div style="font-size:14px; font-weight:600;">時鐘</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorClock" oninput="saveLive('app_clock_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconGallery" class="app-icon" style="background: #4caf50;">🖼️</div>
            <div><div style="font-size:14px; font-weight:600;">相簿</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorGallery" oninput="saveLive('app_gallery_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconNotes" class="app-icon" style="background: #ffc107;">📝</div>
            <div><div style="font-size:14px; font-weight:600;">備忘錄</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorNotes" oninput="saveLive('app_notes_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconWeather" class="app-icon" style="background: #03a9f4;">☁️</div>
            <div><div style="font-size:14px; font-weight:600;">天氣</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorWeather" oninput="saveLive('app_weather_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconMail" class="app-icon" style="background: #f44336;">✉️</div>
            <div><div style="font-size:14px; font-weight:600;">信箱</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorMail" oninput="saveLive('app_mail_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div id="iconArchive" class="app-icon" style="background: #673ab7;">📦</div>
            <div><div style="font-size:14px; font-weight:600;">記憶倉庫</div></div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorArchive" oninput="saveLive('app_archive_color_a', this.value)"></div>
    </div>
</div>

<div class="card">
    <div class="card-title">🖼️ 背景與桌面</div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:600;">桌面背景色 A</div>
        <div class="picker-wrapper"><input type="color" id="bgColorA" oninput="saveLive('bg_color_a', this.value)"></div>
    </div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:600;">桌面背景色 B</div>
        <div class="picker-wrapper"><input type="color" id="bgColorB" oninput="saveLive('bg_color_b', this.value)"></div>
    </div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:500;">彈窗標題色</div>
        <div class="picker-wrapper"><input type="color" id="colorModal" oninput="saveLive('theme_modal_color', this.value)"></div>
    </div>
    <div class="btn-group" style="margin-top: 15px;">
        <button class="btn" onclick="clearWallpaper()">恢復漸層背景</button>
        <button class="btn" style="background:#007aff; color:white;" onclick="location.href='gallery.html'">更換桌布圖片</button>
        <button class="btn btn-danger" onclick="resetFactory()">重設所有設定</button>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalHeader" class="modal-header">標題</div>
        <div id="modalBody" class="modal-body">內容文字</div>
        <div class="modal-footer"><button class="modal-btn" onclick="closeModal()">確定</button></div>
    </div>
</div>

<script>
    const appKeys = {
        'AI': 'app_ai_color_a',
        'Clock': 'app_clock_color_a',
        'Gallery': 'app_gallery_color_a',
        'Notes': 'app_notes_color_a',
        'Weather': 'app_weather_color_a',
        'Mail': 'app_mail_color_a',
        'Archive': 'app_archive_color_a'
    };

    function updateLocalIcons() {
        // 即時預覽圖示顏色
        Object.keys(appKeys).forEach(id => {
            const val = document.getElementById('color' + id).value;
            document.getElementById('icon' + id).style.background = val;
        });
        
        const primary = localStorage.getItem('theme_color_a') || '#007aff';
        document.getElementById('syncBtn').style.background = primary;
        document.documentElement.style.setProperty('--primary', primary);
    }

    function saveLive(key, value) {
        localStorage.setItem(key, value);
        if(key === 'theme_color_a') {
            localStorage.setItem('theme_modal_color', value);
            document.getElementById('colorModal').value = value;
        }
        updateLocalIcons();
    }

    function syncAllToSystem() {
        const colorA = document.getElementById('sysColorA').value;
        // 將所有 APP 與彈窗、背景 A 全部同步
        const keysToSync = [...Object.values(appKeys), 'theme_modal_color', 'chat_bubble_color', 'bg_color_a'];
        
        keysToSync.forEach(key => localStorage.setItem(key, colorA));
        
        // 更新介面上的 Input 數值
        Object.keys(appKeys).forEach(id => document.getElementById('color' + id).value = colorA);
        document.getElementById('colorModal').value = colorA;
        document.getElementById('bgColorA').value = colorA;
        
        updateLocalIcons();
        showNotify('同步完成', '全系統色彩已統一喵！');
    }

    function showNotify(title, msg) {
        const modal = document.getElementById('customModal');
        const header = document.getElementById('modalHeader');
        header.style.background = localStorage.getItem('theme_modal_color') || '#007aff';
        header.innerText = title;
        document.getElementById('modalBody').innerText = msg;
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function clearWallpaper() {
        localStorage.removeItem('active_wallpaper');
        localStorage.setItem('bg_style', 'gradient');
        showNotify('背景更新', '已清除圖片桌布，恢復漸層。');
    }

    function resetFactory() {
        if(confirm('確定要清除所有自定義顏色嗎？')) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => {
        document.getElementById('sysColorA').value = localStorage.getItem('theme_color_a') || '#4285f4';
        document.getElementById('sysColorB').value = localStorage.getItem('theme_color_b') || '#1a2a6c';
        
        Object.keys(appKeys).forEach(id => {
            document.getElementById('color' + id).value = localStorage.getItem(appKeys[id]) || '#888';
        });

        document.getElementById('colorModal').value = localStorage.getItem('theme_modal_color') || '#4285f4';
        document.getElementById('bgColorA').value = localStorage.getItem('bg_color_a') || '#4285f4';
        document.getElementById('bgColorB').value = localStorage.getItem('bg_color_b') || '#1a2a6c';
        updateLocalIcons();
    };
</script>
</body>
</html>
