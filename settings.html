<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>C² 主題自定義</title>
    <style>
        :root { --primary: #007aff; --bg: #f4f4f9; --modal-theme: #007aff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); font-family: -apple-system, sans-serif;
            padding: calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 30px);
            color: #333;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: #333; }

        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .card-title { font-size: 17px; font-weight: bold; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: #000; }

        .app-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 0; border-bottom: 1px solid #f2f2f2; 
        }
        .app-row:last-child { border-bottom: none; }
        .app-info { display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; transition: 0.3s; }

        .picker-wrapper { 
            position: relative; width: 42px; height: 42px; border-radius: 50%; 
            border: 3px solid #fff; box-shadow: 0 0 0 1px #ddd;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #eee;
        }
        input[type="color"] {
            position: absolute; top: -10px; left: -10px; width: 64px; height: 64px; border: none; cursor: pointer; opacity: 0;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn {
            border: none; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.2s; background: #eee; color: #333; text-align: center;
        }
        .btn-primary { background: var(--primary); color: white; grid-column: span 2; padding: 16px; font-size: 15px; }
        .btn-danger { background: #fff1f0; color: #ff3b30; grid-column: span 2; margin-top: 10px; }

        #customModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.4); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background:white; width:85%; max-width:320px; border-radius:28px; 
            overflow:hidden; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        .modal-header { padding:18px; text-align:center; color:white; font-weight:bold; background: var(--modal-theme); }
        .modal-body { padding:25px 20px; text-align:center; color:#444; font-size:15px; line-height:1.5; }
        .modal-footer { display:flex; border-top:1px solid #eee; }
        .modal-btn { flex:1; padding:16px; border:none; background:white; color:var(--modal-theme); font-weight:bold; font-size:16px; cursor:pointer; }
        .modal-btn:last-child { border-left: 1px solid #eee; }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">❮</a>
    <h1 style="font-size: 22px; margin: 0;">我的主題</h1>
</div>

<div class="card">
    <div class="card-title">🌐 桌面圖示主題 (System)</div>
    <div style="display: flex; justify-content: space-around; align-items: center; background: #f9f9f9; padding: 20px; border-radius: 18px; margin-bottom: 15px;">
        <div style="text-align:center">
            <div class="picker-wrapper" id="pw-sysColorA"><input type="color" id="sysColorA" oninput="saveLive('theme_color_a', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">圖示主色</div>
        </div>
        <div style="font-size:24px; color:#ddd;">➔</div>
        <div style="text-align:center">
            <div class="picker-wrapper" id="pw-sysColorB"><input type="color" id="sysColorB" oninput="saveLive('theme_color_b', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">圖示漸層</div>
        </div>
    </div>
    <button class="btn btn-primary" id="syncBtn" onclick="confirmSync()">一鍵同步全系統為圖示主色</button>
</div>

<div class="card">
    <div class="card-title">📱 APP 選色</div>
    <div id="appPickerList"></div>
</div>

<div class="card">
    <div class="card-title">🖼️ 桌面背景色</div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:600;">桌面背景 A (上)</div>
        <div class="picker-wrapper" id="pw-bgColorA"><input type="color" id="bgColorA" oninput="saveLive('bg_color_a', this.value)"></div>
    </div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:600;">桌面背景 B (下)</div>
        <div class="picker-wrapper" id="pw-bgColorB"><input type="color" id="bgColorB" oninput="saveLive('bg_color_b', this.value)"></div>
    </div>
</div>

<div class="card">
    <div class="card-title">🔔 系統彈窗設定</div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:600;">通知彈窗主題色</div>
        <div class="picker-wrapper" id="pw-colorModal"><input type="color" id="colorModal" oninput="saveLive('theme_modal_color', this.value)"></div>
    </div>
    <div class="btn-group" style="margin-top: 15px;">
        <button class="btn" onclick="clearWallpaper()">恢復漸層背景</button>
        <button class="btn" style="background:#007aff; color:white;" onclick="location.href='gallery.html'">更換桌布圖片</button>
        <button class="btn btn-danger" onclick="confirmReset()">重設所有設定</button>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalHeader" class="modal-header">標題</div>
        <div id="modalBody" class="modal-body">內容文字</div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
    const apps = [
        { id: 'AI', name: 'AI 助手', icon: '💬', key: 'app_ai_color_a', def: '#4285f4' },
        { id: 'Clock', name: '時鐘', icon: '⏰', key: 'app_clock_color_a', def: '#ff9500' },
        { id: 'Gallery', name: '相簿', icon: '🖼️', key: 'app_gallery_color_a', def: '#4cd964' },
        { id: 'Notes', name: '備忘錄', icon: '📝', key: 'app_notes_color_a', def: '#ffcc00' },
        { id: 'Weather', name: '天氣', icon: '☁️', key: 'app_weather_color_a', def: '#5ac8fa' },
        { id: 'Mail', name: '信箱', icon: '✉️', key: 'app_mail_color_a', def: '#d44638' },
        { id: 'Archive', name: '記憶倉庫', icon: '📦', key: 'app_archive_color_a', def: '#5856d6' }
    ];

    function initAppList() {
        const container = document.getElementById('appPickerList');
        container.innerHTML = apps.map(app => `
            <div class="app-row">
                <div class="app-info">
                    <div id="icon${app.id}" class="app-icon">${app.icon}</div>
                    <div style="font-size:14px; font-weight:600;">${app.name}</div>
                </div>
                <div class="picker-wrapper" id="pw-color${app.id}">
                    <input type="color" id="color${app.id}" oninput="saveLive('${app.key}', this.value)">
                </div>
            </div>
        `).join('');
    }

    function refreshUI() {
        const modalColor = localStorage.getItem('theme_modal_color') || '#007aff';
        const primaryColor = localStorage.getItem('theme_color_a') || '#007aff';

        document.documentElement.style.setProperty('--primary', primaryColor);
        document.documentElement.style.setProperty('--modal-theme', modalColor);

        const allInputs = document.querySelectorAll('input[type="color"]');
        allInputs.forEach(input => {
            const wrapper = document.getElementById('pw-' + input.id);
            if(wrapper) wrapper.style.backgroundColor = input.value;
        });

        apps.forEach(app => {
            const el = document.getElementById('color' + app.id);
            if(el) {
                document.getElementById('icon' + app.id).style.background = el.value;
            }
        });

        if(document.getElementById('syncBtn')) document.getElementById('syncBtn').style.background = primaryColor;
    }

    function saveLive(key, value) {
        localStorage.setItem(key, value);
        refreshUI();
    }

    function showModal(title, msg, onConfirm = null) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalHeader').innerText = title;
        document.getElementById('modalBody').innerText = msg;
        const footer = document.getElementById('modalFooter');

        if (onConfirm) {
            footer.innerHTML = `
                <button class="modal-btn" style="color:#888" onclick="closeModal()">取消</button>
                <button class="modal-btn" id="mConfirmBtn">確定</button>
            `;
            document.getElementById('mConfirmBtn').onclick = () => { onConfirm(); closeModal(); };
        } else {
            footer.innerHTML = `<button class="modal-btn" onclick="closeModal()">確定</button>`;
        }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function confirmSync() {
        showModal("一鍵同步", "確定要將所有 APP 與背景色統一為主色調嗎？", () => {
            const mainColor = document.getElementById('sysColorA').value;
            apps.forEach(app => {
                localStorage.setItem(app.key, mainColor);
                const input = document.getElementById('color' + app.id);
                if(input) input.value = mainColor;
            });
            localStorage.setItem('theme_modal_color', mainColor);
            localStorage.setItem('bg_color_a', mainColor);
            document.getElementById('colorModal').value = mainColor;
            document.getElementById('bgColorA').value = mainColor;
            refreshUI();
        });
    }

    function confirmReset() {
        showModal("重設系統", "確定要清除所有自定義顏色並恢復預設嗎？", () => {
            localStorage.clear();
            location.reload();
        });
    }

    function clearWallpaper() {
        localStorage.removeItem('active_wallpaper');
        localStorage.setItem('bg_style', 'gradient');
        showModal('背景更新', '已清除圖片桌布，恢復漸層。');
    }

    window.onload = () => {
        initAppList();

        // 1. 先抓取全局主色作為後備參考
        const globalMainColor = localStorage.getItem('theme_color_a') || '#4285f4';

        // 2. 載入系統基礎數值
        document.getElementById('sysColorA').value = globalMainColor;
        document.getElementById('sysColorB').value = localStorage.getItem('theme_color_b') || '#1a2a6c';
        document.getElementById('colorModal').value = localStorage.getItem('theme_modal_color') || globalMainColor;
        document.getElementById('bgColorA').value = localStorage.getItem('bg_color_a') || globalMainColor;
        document.getElementById('bgColorB').value = localStorage.getItem('bg_color_b') || '#1a2a6c';

        // 3. ✨ 核心邏輯：APP 選色載入
        apps.forEach(app => {
            const input = document.getElementById('color' + app.id);
            if(input) {
                // 優先權：獨立存檔 > 系統全局主色 > App 初始預設色
                const saved = localStorage.getItem(app.key);
                input.value = saved || globalMainColor || app.def;
            }
        });

        refreshUI();
    };
</script>
</body>
</html>
