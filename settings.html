<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>視覺自定義中心</title>
    <style>
        :root { --primary: #007aff; --bg: #f4f4f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg); font-family: -apple-system, sans-serif;
            padding: calc(env(safe-area-inset-top) + 20px) 20px calc(env(safe-area-inset-bottom) + 30px);
            color: #333;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: #333; }
        
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .card-title { font-size: 17px; font-weight: bold; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; color: #000; }
        
        .app-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 0; border-bottom: 1px solid #f2f2f2; 
        }
        .app-row:last-child { border-bottom: none; }
        .app-info { display: flex; align-items: center; gap: 12px; }
        .app-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        
        .picker-wrapper { 
            position: relative; width: 42px; height: 42px; border-radius: 50%; 
            overflow: hidden; border: 3px solid #fff; box-shadow: 0 0 0 1px #ddd;
        }
        input[type="color"] {
            position: absolute; top: -5px; left: -5px; width: 60px; height: 60px; border: none; cursor: pointer; background: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .btn {
            border: none; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: 0.2s; background: #eee; color: #333; text-align: center;
        }
        .btn-primary { background: var(--primary); color: white; grid-column: span 2; }
        .btn-danger { background: #fff1f0; color: #ff3b30; grid-column: span 2; margin-top: 10px; }

        /* ✨ 彈窗樣式 */
        #customModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.4); z-index:9999; justify-content:center; align-items:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background:white; width:85%; max-width:320px; border-radius:28px; 
            overflow:hidden; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-header { padding:18px; text-align:center; color:white; font-weight:bold; font-size: 16px; }
        .modal-body { padding:25px 20px; text-align:center; color:#444; font-size:15px; line-height:1.5; }
        .modal-footer { display:flex; border-top:1px solid #eee; }
        .modal-btn { flex:1; padding:16px; border:none; background:white; color:#007aff; font-weight:bold; font-size:16px; cursor:pointer; }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">❮</a>
    <h1 style="font-size: 22px; margin: 0; letter-spacing: -0.5px;">視覺自定義中心</h1>
</div>

<div class="card">
    <div class="card-title">🌐 桌面系統主題</div>
    <div style="display: flex; justify-content: space-around; align-items: center; background: #f9f9f9; padding: 20px; border-radius: 18px; margin-bottom: 15px;">
        <div style="text-align:center">
            <div class="picker-wrapper"><input type="color" id="sysColorA" oninput="saveLive('theme_color_a', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">顏色 A</div>
        </div>
        <div style="font-size:24px; color:#ddd;">➔</div>
        <div style="text-align:center">
            <div class="picker-wrapper"><input type="color" id="sysColorB" oninput="saveLive('theme_color_b', this.value)"></div>
            <div style="font-size:11px; color:#888; margin-top:8px;">顏色 B</div>
        </div>
    </div>
    <button class="btn btn-primary" onclick="syncAllToSystem()">一鍵同步所有 APP 為系統色</button>
</div>

<div class="card">
    <div class="card-title">📱 獨立 APP 選色</div>
    
    <div class="app-row">
        <div class="app-info">
            <div class="app-icon" style="background: #4285f4;">💬</div>
            <div>
                <div style="font-size:14px; font-weight:600;">AI 聊天室</div>
                <div style="font-size:11px; color:#999;">影響對話氣泡與標題列</div>
            </div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorChat" oninput="saveLive('app_chat_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div class="app-icon" style="background: #ff9800;">⏰</div>
            <div>
                <div style="font-size:14px; font-weight:600;">時鐘 APP</div>
                <div style="font-size:11px; color:#999;">影響鬧鐘清單與強調色</div>
            </div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorClock" oninput="saveLive('app_clock_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div class="app-icon" style="background: #673ab7;">📦</div>
            <div>
                <div style="font-size:14px; font-weight:600;">記憶倉庫</div>
                <div style="font-size:11px; color:#999;">影響列表與分類卡片</div>
            </div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorArchive" oninput="saveLive('app_archive_color_a', this.value)"></div>
    </div>

    <div class="app-row">
        <div class="app-info">
            <div class="app-icon" style="background: #e91e63;">📖</div>
            <div>
                <div style="font-size:14px; font-weight:600;">我的日記</div>
                <div style="font-size:11px; color:#999;">影響日記頁面與字體裝飾</div>
            </div>
        </div>
        <div class="picker-wrapper"><input type="color" id="colorDiary" oninput="saveLive('app_diary_color_a', this.value)"></div>
    </div>
</div>

<div class="card">
    <div class="card-title">🖼️ 背景與元件</div>
    <div class="app-row">
        <div style="font-size:14px; font-weight:500;">全系統彈窗標題色</div>
        <div class="picker-wrapper"><input type="color" id="colorModal" oninput="saveLive('theme_modal_color', this.value)"></div>
    </div>
    <div class="btn-group">
        <button class="btn" onclick="clearWallpaper()">恢復漸層背景</button>
        <button class="btn" style="background:#007aff; color:white;" onclick="location.href='gallery.html'">進入相簿選桌布</button>
        <button class="btn btn-danger" onclick="resetFactory()">重設所有設定</button>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalHeader" class="modal-header">標題</div>
        <div id="modalBody" class="modal-body">內容文字</div>
        <div class="modal-footer"><button class="modal-btn" onclick="closeModal()">確定</button></div>
    </div>
</div>

<script>
    function saveLive(key, value) {
        localStorage.setItem(key, value);
        // 如果是修改系統主色，自動更新彈窗色作為配套
        if(key === 'theme_color_a') {
            localStorage.setItem('theme_modal_color', value);
            document.getElementById('colorModal').value = value;
        }
    }

    function syncAllToSystem() {
        const colorA = document.getElementById('sysColorA').value;
        const keys = ['app_chat_color_a', 'app_clock_color_a', 'app_archive_color_a', 'app_diary_color_a', 'theme_modal_color', 'chat_bubble_color'];
        
        keys.forEach(key => localStorage.setItem(key, colorA));
        
        // 更新當前頁面的 UI
        document.getElementById('colorChat').value = colorA;
        document.getElementById('colorClock').value = colorA;
        document.getElementById('colorArchive').value = colorA;
        document.getElementById('colorDiary').value = colorA;
        document.getElementById('colorModal').value = colorA;
        
        showNotify('同步成功', '所有 APP 的色彩已統一！');
    }

    function showNotify(title, msg) {
        const modal = document.getElementById('customModal');
        const header = document.getElementById('modalHeader');
        header.style.background = localStorage.getItem('theme_modal_color') || '#007aff';
        document.getElementById('modalHeader').innerText = title;
        document.getElementById('modalBody').innerText = msg;
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function clearWallpaper() {
        localStorage.removeItem('active_wallpaper');
        localStorage.setItem('bg_style', 'gradient');
        showNotify('背景更新', '已清除桌布，恢復為動態漸層。');
    }

    function resetFactory() {
        if(confirm('確定要清除所有自定義顏色與桌布嗎？')) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => {
        // 從 Storage 載入所有值
        document.getElementById('sysColorA').value = localStorage.getItem('theme_color_a') || '#4285f4';
        document.getElementById('sysColorB').value = localStorage.getItem('theme_color_b') || '#1a2a6c';
        
        document.getElementById('colorChat').value = localStorage.getItem('app_chat_color_a') || '#4285f4';
        document.getElementById('colorClock').value = localStorage.getItem('app_clock_color_a') || '#ff9800';
        document.getElementById('colorArchive').value = localStorage.getItem('app_archive_color_a') || '#673ab7';
        document.getElementById('colorDiary').value = localStorage.getItem('app_diary_color_a') || '#e91e63';
        document.getElementById('colorModal').value = localStorage.getItem('theme_modal_color') || '#4285f4';
    };
</script>
</body>
</html>
