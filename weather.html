<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣象 APP</title>
    <style>
        :root { --primary: #00bcd4; --bg: #f0f4f8; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; background: white; border-bottom: 1px solid #ddd; }
        a { text-decoration: none; color: var(--primary); font-size: 16px; font-weight: bold; }
        
        /* 選單區域 */
        .selector-area { padding: 15px; background: white; text-align: center; border-bottom: 1px solid #eee; }
        #citySelect { 
            width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; 
            font-size: 16px; outline: none; background-color: #fff;
        }

        .weather-card {
            margin: 20px; padding: 30px; border-radius: 24px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .city-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .temp { font-size: 64px; font-weight: bold; margin: 10px 0; }
        .condition { font-size: 20px; opacity: 0.9; }
        
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px; }
        .info-box { background: white; padding: 15px; border-radius: 16px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .info-value { font-size: 18px; font-weight: bold; color: #333; }
        
        .status-msg { font-size: 14px; color: #666; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="app-bar">
    <a href="index.html">❮ 桌面</a>
    <h3 style="margin:0">氣象</h3>
    <span style="width:40px"></span>
</div>

<div class="selector-area">
    <select id="citySelect" onchange="handleSelectChange()">
        <option value="" disabled selected>請選擇城市喵...</option>
        <option value="taoyuan">桃園市</option>
        <option value="taipei">台北市</option>
        <option value="hsinchu">新竹市</option>
        <option value="taichung">台中市</option>
        <option value="tainan">台南市</option>
        <option value="kaohsiung">高雄市</option>
        <option value="tokyo">東京 (日本)</option>
        <option value="seoul">首爾 (韓國)</option>
    </select>
</div>

<div id="weather-content" style="display:none;">
    <div class="weather-card">
        <div class="city-name" id="cityName">---</div>
        <div class="temp" id="temp">--°C</div>
        <div class="condition" id="desc">讀取中...</div>
    </div>

    <div class="details">
        <div class="info-box">
            <div class="info-label">風速</div>
            <div class="info-value" id="windspeed">-- km/h</div>
        </div>
        <div class="info-box">
            <div class="info-label">降雨機率 (代碼)</div>
            <div class="info-value" id="weatherCode">--</div>
        </div>
    </div>
</div>

<div id="status" class="status-msg">請從上方選單選擇地點。</div>

<script>
    // 經緯度資料庫
    const cityMap = {
        "taipei": { lat: 25.03, lon: 121.56, name: "台北市" },
        "taoyuan": { lat: 24.99, lon: 121.30, name: "桃園市" },
        "hsinchu": { lat: 24.81, lon: 120.96, name: "新竹市" },
        "taichung": { lat: 24.14, lon: 120.67, name: "台中市" },
        "tainan": { lat: 22.99, lon: 120.21, name: "台南市" },
        "kaohsiung": { lat: 22.61, lon: 120.31, name: "高雄市" },
        "tokyo": { lat: 35.68, lon: 139.65, name: "東京" },
        "seoul": { lat: 37.56, lon: 126.97, name: "首爾" }
    };

    function handleSelectChange() {
        const select = document.getElementById('citySelect');
        const cityKey = select.value;
        if (cityMap[cityKey]) {
            const city = cityMap[cityKey];
            fetchWeather(city.lat, city.lon, city.name);
        }
    }

    async function fetchWeather(lat, lon, displayName) {
        document.getElementById('status').innerText = "獲取氣象數據中...";
        document.getElementById('status').style.display = 'block';
        document.getElementById('weather-content').style.display = 'none';

        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await res.json();
            const current = data.current_weather;
            
            document.getElementById('cityName').innerText = displayName;
            document.getElementById('temp').innerText = `${Math.round(current.temperature)}°C`;
            document.getElementById('desc').innerText = translateCondition(current.weathercode);
            document.getElementById('windspeed').innerText = `${current.windspeed} km/h`;
            document.getElementById('weatherCode').innerText = `#${current.weathercode}`;
            
            document.getElementById('weather-content').style.display = 'block';
            document.getElementById('status').style.display = 'none';
            
            // 儲存最後一次選擇
            localStorage.setItem('last_city_key', document.getElementById('citySelect').value);
        } catch (e) {
            document.getElementById('status').innerText = "讀取失敗喵，請檢查網路。";
        }
    }

    function translateCondition(code) {
        const mapping = {
            0: "晴朗", 1: "大致晴朗", 2: "多雲", 3: "陰天",
            45: "霧", 48: "霧", 51: "毛毛雨", 61: "小雨", 80: "陣雨", 95: "雷雨"
        };
        return mapping[code] || "天氣晴朗";
    }

    window.onload = () => {
        const lastKey = localStorage.getItem('last_city_key');
        if (lastKey) {
            document.getElementById('citySelect').value = lastKey;
            handleSelectChange();
        }
    };
</script>
</body>
</html>
